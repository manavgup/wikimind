# fly.staging.toml — Fly.io deployment for WikiMind staging environment.
#
# EPHEMERAL pre-prod gate: the deploy workflow creates the staging app,
# volume, and Postgres from scratch, deploys, smoke-tests, and destroys
# the whole stack afterwards (see .github/workflows/deploy.yml). Nothing
# staging-related runs between deploys.  Same machine specs as
# production (fly.toml).
#
# There is no manual first-time setup — CI provisions everything.
#
# Single machine runs web + ARQ worker + Redis via docker/start-combined.sh
# (same as production). Staging has its own in-machine Redis — it no longer
# shares any external Redis with production.

app = "wikimind-staging"
primary_region = "ord"
# Graceful shutdown is ordered: drain gunicorn + arq first, then redis AOF
# flush last.  30s equalled gunicorn's graceful_timeout, leaving zero
# headroom for the redis flush — bumped to 60s.
kill_timeout = 60

[build]
  dockerfile = "Dockerfile"

[env]
  WIKIMIND_SERVER__HOST = "0.0.0.0"
  WIKIMIND_SERVER__PORT = "7842"
  # Staging shares the production Docling sidecar — it is stateless and
  # scale-to-zero, and the smoke tests don't exercise PDF conversion, so
  # a dedicated per-run sidecar (a 4GB-image deploy) isn't worth it.
  WIKIMIND_DOCLING_SERVE_URL = "http://wikimind-docling.internal:5001"
  WIKIMIND_REDIS_URL = "redis://localhost:6379/0"

[http_service]
  internal_port = 7842
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["web"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 25


[processes]
  web = "./start-combined.sh"

[deploy]
  strategy = "rolling"
  release_command = ".venv/bin/python -m alembic upgrade head"

[mounts]
  source = "wikimind_staging_data"
  destination = "/home/wikimind/.wikimind"

[[vm]]
  # Three processes share this machine (web + arq worker + redis).
  # Staging pins min_machines_running = 1, so cost is bounded by the CI
  # teardown job that destroys this app after the smoke gate — not by
  # scale-to-zero (which does not apply here).
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    type = "http"
    port = 7842
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "60s"
