<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="eyebrow">Corner radii</div>
  <div style="display:flex;gap:16px;align-items:center">

    <div style="width:64px;height:64px;background:#e6eef7;border:1px solid #c5d6ea;border-radius:6px"></div>

    <div style="width:96px;height:32px;background:#e6eef7;border:1px solid #c5d6ea;border-radius:9999px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#2b4876;font-weight:500">capsule</div>
  </div>

    <div style="width:64px;text-align:center">8 <span class="mono">lg</span><br>cards</div>
    <div style="width:64px;text-align:center">12 <span class="mono">xl</span><br>modals</div>

  </div>
