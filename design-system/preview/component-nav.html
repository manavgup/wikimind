<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css" style="padding:0"></head>
<body><div class="card" style="padding:0;flex-direction:row;gap:0;background:#f8fafc">
  <aside style="width:224px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column">
    <div style="display:flex;align-items:center;gap:8px;padding:18px 20px;border-bottom:1px solid #e2e8f0">
      <span style="font-size:18px">🧠</span>
      <span style="font:600 15px 'Inter',sans-serif;color:#1e293b">WikiMind</span>
    </div>
    <nav style="display:flex;flex-direction:column;padding:12px;gap:2px">
      <a style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;background:#f4f7fb;color:#2b4876;font:500 13px 'Inter',sans-serif;text-decoration:none">📥 Inbox</a>
      <a style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;color:#475569;font:500 13px 'Inter',sans-serif;text-decoration:none">💬 Ask</a>
      <a style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;color:#475569;font:500 13px 'Inter',sans-serif;text-decoration:none">📚 Wiki</a>
      <a style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;color:#475569;font:500 13px 'Inter',sans-serif;text-decoration:none">🕸️ Graph</a>
      <a style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;color:#475569;font:500 13px 'Inter',sans-serif;text-decoration:none">🩺 Health</a>
      <a style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;color:#475569;font:500 13px 'Inter',sans-serif;text-decoration:none">⚙️ Settings</a>
    </nav>
  </aside>
  <div style="flex:1;padding:16px">
    <div class="eyebrow" style="margin-bottom:8px">Sidebar nav</div>
    <div class="hint">Fixed 224 px. Active item: <code class="ds-code">bg-brand-50 text-brand-700</code>. Hover: <code class="ds-code">bg-slate-100</code>. Emoji icons (fixed set).</div>
  </div>
</div></body></html>
