<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="eyebrow">Buttons</div>
  <div class="row">
    <button style="background:#365b91;color:#fff;border:none;padding:6px 14px;border-radius:6px;font:500 13px 'Inter',sans-serif;cursor:pointer">Add source</button>
    <button style="background:#fff;color:#334155;border:1px solid #cbd5e1;padding:6px 14px;border-radius:6px;font:500 13px 'Inter',sans-serif;cursor:pointer">Secondary</button>
    <button style="background:transparent;color:#475569;border:none;padding:6px 14px;border-radius:6px;font:500 13px 'Inter',sans-serif;cursor:pointer">Ghost</button>
    <button style="background:#e11d48;color:#fff;border:none;padding:6px 14px;border-radius:6px;font:500 13px 'Inter',sans-serif;cursor:pointer">Delete</button>
  </div>
  <div class="row">
    <button style="background:#365b91;color:#fff;border:none;padding:4px 10px;border-radius:6px;font:500 12px 'Inter',sans-serif;cursor:pointer">sm primary</button>
    <button style="background:#fff;color:#334155;border:1px solid #cbd5e1;padding:4px 10px;border-radius:6px;font:500 12px 'Inter',sans-serif;cursor:pointer">sm secondary</button>
    <button style="background:#bccddf;color:#fff;border:none;padding:6px 14px;border-radius:6px;font:500 13px 'Inter',sans-serif" disabled>Disabled</button>
  </div>
  <div class="hint">Primary brand-600 → brand-700 on hover. No shadow, no scale. 6 / 14 px padding (md), 4 / 10 (sm).</div>
</div></body></html>
