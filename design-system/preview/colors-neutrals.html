<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="eyebrow">Slate neutrals — text, borders, surfaces</div>
  <div style="display:grid;grid-template-columns:repeat(11,1fr);gap:6px">
    <div style="background:#f8fafc;padding:6px 4px;border-radius:6px;border:1px solid #e2e8f0;font-size:10px"><div style="height:28px"></div>50</div>
    <div style="background:#f1f5f9;padding:6px 4px;border-radius:6px;border:1px solid #e2e8f0;font-size:10px"><div style="height:28px"></div>100</div>
    <div style="background:#e2e8f0;padding:6px 4px;border-radius:6px;font-size:10px"><div style="height:28px"></div>200</div>
    <div style="background:#cbd5e1;padding:6px 4px;border-radius:6px;font-size:10px"><div style="height:28px"></div>300</div>
    <div style="background:#94a3b8;padding:6px 4px;border-radius:6px;font-size:10px;color:#fff"><div style="height:28px"></div>400</div>
    <div style="background:#64748b;padding:6px 4px;border-radius:6px;font-size:10px;color:#fff"><div style="height:28px"></div>500</div>
    <div style="background:#475569;padding:6px 4px;border-radius:6px;font-size:10px;color:#fff"><div style="height:28px"></div>600</div>
    <div style="background:#334155;padding:6px 4px;border-radius:6px;font-size:10px;color:#fff"><div style="height:28px"></div>700</div>
    <div style="background:#1e293b;padding:6px 4px;border-radius:6px;font-size:10px;color:#fff"><div style="height:28px"></div>800</div>
    <div style="background:#0f172a;padding:6px 4px;border-radius:6px;font-size:10px;color:#fff"><div style="height:28px"></div>900</div>
    <div style="background:#020617;padding:6px 4px;border-radius:6px;font-size:10px;color:#fff"><div style="height:28px"></div>950</div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-top:4px;font-size:11px">
    <div><span class="eyebrow">fg-1</span><div style="color:#0f172a;font-weight:600;margin-top:2px">Primary text</div></div>
    <div><span class="eyebrow">fg-2</span><div style="color:#334155;margin-top:2px">Body copy</div></div>
    <div><span class="eyebrow">fg-3</span><div style="color:#64748b;margin-top:2px">Metadata</div></div>
    <div><span class="eyebrow">fg-4</span><div style="color:#94a3b8;margin-top:2px">Disabled</div></div>
  </div>
</div></body></html>
