<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="background:#f8fafc">
  <div class="eyebrow">Elevation — restrained · borders carry the weight</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:18px;text-align:center">
      <div style="font-size:12px;font-weight:600;color:#0f172a">border only</div>
      <div class="mono" style="margin-top:4px">1px #e2e8f0</div>
    </div>
    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:18px;text-align:center;box-shadow:0 1px 2px 0 rgb(0 0 0 / 0.04)">
      <div style="font-size:12px;font-weight:600;color:#0f172a">shadow-sm</div>
      <div class="mono" style="margin-top:4px">card default</div>
    </div>
    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:18px;text-align:center;box-shadow:0 1px 3px 0 rgb(0 0 0 / 0.06), 0 1px 2px -1px rgb(0 0 0 / 0.04)">
      <div style="font-size:12px;font-weight:600;color:#0f172a">shadow-md</div>
      <div class="mono" style="margin-top:4px">hover state</div>
    </div>
  </div>
  <div class="hint">No glass, no colored shadows, no inner shadows. Panels are flat and bordered.</div>
</div></body></html>
