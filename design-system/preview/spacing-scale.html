<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="eyebrow">Spacing scale · 4 px grid</div>
  <div style="display:flex;gap:12px;align-items:flex-end">
    <div style="text-align:center"><div style="background:#4673ad;height:4px;width:32px;border-radius:2px"></div><div class="mono" style="margin-top:6px">4</div></div>
    <div style="text-align:center"><div style="background:#4673ad;height:8px;width:32px;border-radius:2px"></div><div class="mono" style="margin-top:6px">8</div></div>
    <div style="text-align:center"><div style="background:#4673ad;height:12px;width:32px;border-radius:2px"></div><div class="mono" style="margin-top:6px">12</div></div>
    <div style="text-align:center"><div style="background:#4673ad;height:16px;width:32px;border-radius:2px"></div><div class="mono" style="margin-top:6px">16</div></div>
    <div style="text-align:center"><div style="background:#4673ad;height:20px;width:32px;border-radius:2px"></div><div class="mono" style="margin-top:6px">20</div></div>
    <div style="text-align:center"><div style="background:#4673ad;height:24px;width:32px;border-radius:2px"></div><div class="mono" style="margin-top:6px">24</div></div>
    <div style="text-align:center"><div style="background:#4673ad;height:32px;width:32px;border-radius:2px"></div><div class="mono" style="margin-top:6px">32</div></div>
    <div style="text-align:center"><div style="background:#4673ad;height:40px;width:32px;border-radius:2px"></div><div class="mono" style="margin-top:6px">40</div></div>
    <div style="text-align:center"><div style="background:#4673ad;height:48px;width:32px;border-radius:2px"></div><div class="mono" style="margin-top:6px">48</div></div>
  </div>
  <div class="hint">Cards pad at 16 / 20. Card-to-card gaps at 12. View gutters at 24.</div>
</div></body></html>
