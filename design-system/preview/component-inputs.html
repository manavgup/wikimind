<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="eyebrow">Form inputs</div>
  <input type="text" placeholder="Paste a URL (article, YouTube, RSS feed)..." style="width:100%;padding:8px 12px;border:1px solid #cbd5e1;border-radius:6px;font:400 13px 'Inter',sans-serif;color:#0f172a;outline:none">
  <input type="text" value="Rust ownership model" style="width:100%;padding:8px 12px;border:1px solid #4673ad;border-radius:6px;font:400 13px 'Inter',sans-serif;color:#0f172a;outline:none;box-shadow:0 0 0 1px #4673ad">
  <textarea style="width:100%;padding:8px 12px;border:1px solid #cbd5e1;border-radius:6px;font:400 13px 'Inter',sans-serif;color:#0f172a;outline:none;resize:none;height:56px">Ask anything about what you've fed the wiki...</textarea>
  <div class="hint">Default · focus (brand-500 border + ring) · multi-line. No floating labels.</div>
</div></body></html>
