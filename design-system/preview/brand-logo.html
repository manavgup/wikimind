<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="eyebrow">Logo · wordmark</div>
  <div style="display:flex;gap:32px;align-items:center">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:32px">🧠</span>
      <span style="font:600 26px 'Inter',sans-serif;color:#1e293b;letter-spacing:-0.01em">WikiMind</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;padding:8px 14px;background:#1e293b;border-radius:6px">
      <span style="font-size:20px">🧠</span>
      <span style="font:600 17px 'Inter',sans-serif;color:#f1f5f9;letter-spacing:-0.01em">WikiMind</span>
    </div>
  </div>
  <div class="hint">Brain emoji + Inter semibold, tight tracking (−0.01em). On dark: wordmark in <code class="ds-code">slate-100</code>. Keep at least 8 px between glyph and text.</div>
</div></body></html>
