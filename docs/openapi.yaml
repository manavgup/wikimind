openapi: 3.1.0
info:
  title: WikiMind Gateway
  description: Local LLM Knowledge OS — Personal API
  version: 0.1.0
paths:
  /metrics:
    get:
      summary: Metrics
      description: Endpoint that serves Prometheus metrics.
      operationId: metrics_metrics_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/ingest/url:
    post:
      tags:
      - Ingest
      summary: Ingest Url
      description: Ingest a web URL or YouTube video.
      operationId: ingest_url_api_ingest_url_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestURLRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Source'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/ingest/pdf:
    post:
      tags:
      - Ingest
      summary: Ingest Pdf
      description: 'Upload and ingest a PDF.


        The ``auto_compile`` query parameter (default ``True``) controls whether the

        source is enqueued for background compilation immediately after upload.'
      operationId: ingest_pdf_api_ingest_pdf_post
      parameters:
      - name: auto_compile
        in: query
        required: false
        schema:
          type: boolean
          default: true
          title: Auto Compile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_ingest_pdf_api_ingest_pdf_post'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Source'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/ingest/text:
    post:
      tags:
      - Ingest
      summary: Ingest Text
      description: Ingest raw text or a note.
      operationId: ingest_text_api_ingest_text_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestTextRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Source'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/ingest/sources:
    get:
      tags:
      - Ingest
      summary: List Sources
      description: List all ingested sources.
      operationId: list_sources_api_ingest_sources_get
      parameters:
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Source'
                title: Response List Sources Api Ingest Sources Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/ingest/sources/{source_id}:
    get:
      tags:
      - Ingest
      summary: Get Source
      description: Get source by ID.
      operationId: get_source_api_ingest_sources__source_id__get
      parameters:
      - name: source_id
        in: path
        required: true
        schema:
          type: string
          title: Source Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Source'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Ingest
      summary: Delete Source
      description: Delete a source by ID.
      operationId: delete_source_api_ingest_sources__source_id__delete
      parameters:
      - name: source_id
        in: path
        required: true
        schema:
          type: string
          title: Source Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteConfirmation'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/ingest/sources/{source_id}/detail:
    get:
      tags:
      - Ingest
      summary: Get Source Detail
      description: Get full source detail with pipeline steps, images, and linked
        articles.
      operationId: get_source_detail_api_ingest_sources__source_id__detail_get
      parameters:
      - name: source_id
        in: path
        required: true
        schema:
          type: string
          title: Source Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceDetailResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/ingest/sources/{source_id}/content:
    get:
      tags:
      - Ingest
      summary: Get Source Content
      description: Return the raw text content of a source for side-by-side reading.
      operationId: get_source_content_api_ingest_sources__source_id__content_get
      parameters:
      - name: source_id
        in: path
        required: true
        schema:
          type: string
          title: Source Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceContentResponse'
        '404':
          description: Source not found or has no content
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/ingest/sources/{source_id}/original:
    get:
      tags:
      - Ingest
      summary: Get Source Original
      description: 'Stream the original source document (PDF, HTML, etc.).


        Returns the raw binary stored during ingest — not the extracted text.

        Sources that have no original (text, YouTube) return 404.'
      operationId: get_source_original_api_ingest_sources__source_id__original_get
      parameters:
      - name: source_id
        in: path
        required: true
        schema:
          type: string
          title: Source Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/ingest/sources/{source_id}/images:
    get:
      tags:
      - Ingest
      summary: List Source Images
      description: 'List extracted images for a PDF source.


        Reads from the ``source_image`` table first (DB-backed storage),

        falling back to the filesystem for pre-migration sources.'
      operationId: list_source_images_api_ingest_sources__source_id__images_get
      parameters:
      - name: source_id
        in: path
        required: true
        schema:
          type: string
          title: Source Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties:
                    type: string
                title: Response List Source Images Api Ingest Sources  Source Id  Images
                  Get
        '404':
          description: Source not found or no images available
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/ingest/sources/{source_id}/images/{filename}:
    get:
      tags:
      - Ingest
      summary: Get Source Image
      description: 'Serve an extracted image file for a PDF source.


        Reads from the ``source_image`` table first (DB-backed storage),

        falling back to the filesystem for pre-migration sources.'
      operationId: get_source_image_api_ingest_sources__source_id__images__filename__get
      parameters:
      - name: source_id
        in: path
        required: true
        schema:
          type: string
          title: Source Id
      - name: filename
        in: path
        required: true
        schema:
          type: string
          title: Filename
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '404':
          description: Image not found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/capture/{kind}:
    post:
      tags:
      - Capture
      summary: Create Capture
      description: Push a raw capture from an ambient adapter.
      operationId: create_capture_api_capture__kind__post
      parameters:
      - name: kind
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/CaptureKind'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaptureRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptureResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/capture:
    get:
      tags:
      - Capture
      summary: List Captures
      description: List captures (the capture inbox).
      operationId: list_captures_api_capture_get
      parameters:
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/CaptureStatus'
          - type: 'null'
          title: Status
      - name: kind
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/CaptureKind'
          - type: 'null'
          title: Kind
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptureListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/capture/{capture_id}/ingest:
    post:
      tags:
      - Capture
      summary: Ingest Capture
      description: Promote a capture to a full source for compilation.
      operationId: ingest_capture_api_capture__capture_id__ingest_post
      parameters:
      - name: capture_id
        in: path
        required: true
        schema:
          type: string
          title: Capture Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptureIngestResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/capture/{capture_id}/discard:
    post:
      tags:
      - Capture
      summary: Discard Capture
      description: Mark a capture as not-worth-keeping.
      operationId: discard_capture_api_capture__capture_id__discard_post
      parameters:
      - name: capture_id
        in: path
        required: true
        schema:
          type: string
          title: Capture Id
      requestBody:
        content:
          application/json:
            schema:
              anyOf:
              - $ref: '#/components/schemas/DiscardCaptureRequest'
              - type: 'null'
              title: Request
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptureDiscardResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/capture/rss/feeds:
    get:
      tags:
      - Capture
      summary: List Rss Feeds
      description: List all RSS feed subscriptions.
      operationId: list_rss_feeds_api_capture_rss_feeds_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RssFeedListResponse'
    post:
      tags:
      - Capture
      summary: Subscribe Rss Feed
      description: Subscribe to an RSS/Atom feed.
      operationId: subscribe_rss_feed_api_capture_rss_feeds_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RssFeedRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RssFeedResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/capture/rss/feeds/{feed_id}:
    patch:
      tags:
      - Capture
      summary: Toggle Rss Feed
      description: Enable or disable an RSS feed.
      operationId: toggle_rss_feed_api_capture_rss_feeds__feed_id__patch
      parameters:
      - name: feed_id
        in: path
        required: true
        schema:
          type: string
          title: Feed Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RssFeedToggleRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RssFeedResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Capture
      summary: Delete Rss Feed
      description: Delete an RSS feed subscription.
      operationId: delete_rss_feed_api_capture_rss_feeds__feed_id__delete
      parameters:
      - name: feed_id
        in: path
        required: true
        schema:
          type: string
          title: Feed Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteConfirmation'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/capture/rss/feeds/{feed_id}/poll:
    post:
      tags:
      - Capture
      summary: Poll Rss Feed
      description: Manually trigger a poll for a single RSS feed.
      operationId: poll_rss_feed_api_capture_rss_feeds__feed_id__poll_post
      parameters:
      - name: feed_id
        in: path
        required: true
        schema:
          type: string
          title: Feed Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RssPollResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/ingest/sources/{source_id}/draft:
    get:
      tags:
      - Ingest
      summary: Get Draft
      description: Get the pending compilation draft for a source.
      operationId: get_draft_api_ingest_sources__source_id__draft_get
      parameters:
      - name: source_id
        in: path
        required: true
        schema:
          type: string
          title: Source Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompilationDraftResponse'
        '404':
          description: No pending draft for this source
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/ingest/sources/{source_id}/draft/approve:
    post:
      tags:
      - Ingest
      summary: Approve Draft
      description: 'Approve a compilation draft, optionally with focus guidance.


        When ``guidance`` is provided, the source is re-compiled with the

        user''s direction. Otherwise the original draft is saved as-is.'
      operationId: approve_draft_api_ingest_sources__source_id__draft_approve_post
      parameters:
      - name: source_id
        in: path
        required: true
        schema:
          type: string
          title: Source Id
      requestBody:
        content:
          application/json:
            schema:
              anyOf:
              - $ref: '#/components/schemas/ApproveDraftRequest'
              - type: 'null'
              title: Body
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApproveDraftResponse'
        '404':
          description: No pending draft for this source
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/ingest/sources/{source_id}/draft/reject:
    post:
      tags:
      - Ingest
      summary: Reject Draft
      description: Reject a compilation draft and reset the source to pending.
      operationId: reject_draft_api_ingest_sources__source_id__draft_reject_post
      parameters:
      - name: source_id
        in: path
        required: true
        schema:
          type: string
          title: Source Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RejectDraftResponse'
        '404':
          description: No pending draft for this source
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/wiki/contradiction-resolutions:
    get:
      tags:
      - Wiki
      summary: List Contradiction Resolutions
      description: Return the valid contradiction resolution options.
      operationId: list_contradiction_resolutions_api_wiki_contradiction_resolutions_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ContradictionResolutionOption'
                type: array
                title: Response List Contradiction Resolutions Api Wiki Contradiction
                  Resolutions Get
  /api/wiki/contradictions:
    get:
      tags:
      - Wiki
      summary: List Contradictions
      description: List all contradictions for the user, optionally filtered by status.
      operationId: list_contradictions_api_wiki_contradictions_get
      parameters:
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/ContradictionStatus'
          - type: 'null'
          title: Status
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContradictionResponse'
                title: Response List Contradictions Api Wiki Contradictions Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/wiki/contradictions/{contradiction_id}:
    get:
      tags:
      - Wiki
      summary: Get Contradiction
      description: Get a single contradiction with article details.
      operationId: get_contradiction_api_wiki_contradictions__contradiction_id__get
      parameters:
      - name: contradiction_id
        in: path
        required: true
        schema:
          type: string
          title: Contradiction Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContradictionResponse'
        '404':
          description: Contradiction not found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - Wiki
      summary: Resolve Persisted Contradiction
      description: Resolve or dismiss a contradiction.
      operationId: resolve_persisted_contradiction_api_wiki_contradictions__contradiction_id__patch
      parameters:
      - name: contradiction_id
        in: path
        required: true
        schema:
          type: string
          title: Contradiction Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveContradictionBody'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContradictionResponse'
        '404':
          description: Contradiction not found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/wiki/articles:
    get:
      tags:
      - Wiki
      summary: List Articles
      description: List wiki articles with optional filtering and source provenance.
      operationId: list_articles_api_wiki_articles_get
      parameters:
      - name: concept
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Concept
      - name: confidence
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Confidence
      - name: page_type
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Page Type
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArticleSummaryResponse'
                title: Response List Articles Api Wiki Articles Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/wiki/articles/stub:
    post:
      tags:
      - Wiki
      summary: Create Stub Article
      description: Create a stub wiki article — a placeholder page for a concept not
        yet compiled.
      operationId: create_stub_article_api_wiki_articles_stub_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStubRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateStubResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/wiki/wikilinks/resolve:
    get:
      tags:
      - Wiki
      summary: Resolve Wikilinks
      description: Search articles by partial title for wikilink autocomplete.
      operationId: resolve_wikilinks_api_wiki_wikilinks_resolve_get
      parameters:
      - name: q
        in: query
        required: true
        schema:
          type: string
          minLength: 1
          title: Q
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 50
          minimum: 1
          default: 10
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WikilinkMatch'
                title: Response Resolve Wikilinks Api Wiki Wikilinks Resolve Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/wiki/articles/random:
    get:
      tags:
      - Wiki
      summary: Get Random Article
      description: Return a random article belonging to the current user.
      operationId: get_random_article_api_wiki_articles_random_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleSummaryResponse'
        '404':
