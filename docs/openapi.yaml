        Requires an existing session (cookie or Bearer token). Users must

        authenticate first via OAuth or magic link, then create API tokens.


        The raw JWT is returned only once in the response. The caller must

        store it securely. The token includes a ``token_use: api`` claim to

        distinguish it from session JWTs.'
      operationId: create_api_token_auth_token_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenCreateRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenCreateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /auth/logout:
    post:
      tags:
      - Auth
      summary: Logout
      description: Clear the session cookie.
      operationId: logout_auth_logout_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /auth/account:
    delete:
      tags:
      - Auth
      summary: Delete Account
      description: Delete the current user's account and all owned data.
      operationId: delete_account_auth_account_delete
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteAccountResponse'
  /.well-known/oauth-authorization-server:
    get:
      tags:
      - Auth
      summary: Oauth Metadata
      description: Return OAuth 2.1 Authorization Server Metadata per RFC 8414.
      operationId: oauth_metadata__well_known_oauth_authorization_server_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /mcp/authorize:
    get:
      tags:
      - Auth
      summary: Authorize
      description: 'Handle OAuth 2.1 authorization request.


        Validates the authorization request parameters, stores them, and

        either shows the consent screen (if logged in) or redirects to login.'
      operationId: authorize_mcp_authorize_get
      parameters:
      - name: response_type
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Response Type
      - name: client_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Client Id
      - name: redirect_uri
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Redirect Uri
      - name: code_challenge
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Code Challenge
      - name: code_challenge_method
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Code Challenge Method
      - name: state
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: State
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /mcp/authorize/resume:
    get:
      tags:
      - Auth
      summary: Authorize Resume
      description: 'Resume authorization flow after login.


        The user was redirected to login, and after successful login they

        are sent back here. We now show the consent screen.'
      operationId: authorize_resume_mcp_authorize_resume_get
      parameters:
      - name: rid
        in: query
        required: true
        schema:
          type: string
          title: Rid
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /mcp/authorize/decide:
    post:
      tags:
      - Auth
      summary: Authorize Decide
      description: 'Handle consent decision (approve or deny).


        On approval, generates an authorization code, stores it, and

        redirects to the client''s redirect_uri with the code and state.'
      operationId: authorize_decide_mcp_authorize_decide_post
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Body_authorize_decide_mcp_authorize_decide_post'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /mcp/token:
    post:
      tags:
      - Auth
      summary: Token Exchange
      description: 'Exchange an authorization code for an access token (PKCE).


        Validates the grant type, code, redirect_uri match, PKCE verifier,

        and that the code hasn''t expired or been used. Returns a short-lived

        access token with ``wmk_`` prefix.'
      operationId: token_exchange_mcp_token_post
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Body_token_exchange_mcp_token_post'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /mcp/revoke:
    post:
      tags:
      - Auth
      summary: Revoke Token
      description: 'Revoke an access token.


        Per RFC 7009, always returns 200 even if the token is not found.'
      operationId: revoke_token_mcp_revoke_post
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Body_revoke_token_mcp_revoke_post'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /health:
    get:
      summary: Health Check
      description: Health check — used by Electron to confirm daemon is ready.
      operationId: health_check_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
