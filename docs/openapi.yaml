      - api_key
      title: APIKeyRequest
      description: Request to set an API key.
    ArticleResponse:
      properties:
        id:
          type: string
          title: Id
        slug:
          type: string
          title: Slug
        title:
          type: string
          title: Title
        summary:
          anyOf:
          - type: string
          - type: 'null'
          title: Summary
        confidence:
          anyOf:
          - $ref: '#/components/schemas/ConfidenceLevel'
          - type: 'null'
        linter_score:
          anyOf:
          - type: number
          - type: 'null'
          title: Linter Score
        concepts:
          items:
            type: string
          type: array
          title: Concepts
          default: []
        backlinks_in:
          items:
            $ref: '#/components/schemas/BacklinkEntry'
          type: array
          title: Backlinks In
          default: []
        backlinks_out:
          items:
            $ref: '#/components/schemas/BacklinkEntry'
          type: array
          title: Backlinks Out
          default: []
        content:
          type: string
          title: Content
        sources:
          items:
            $ref: '#/components/schemas/SourceResponse'
          type: array
          title: Sources
          default: []
        created_at:
          type: string
          format: date-time
          title: Created At
        updated_at:
          type: string
          format: date-time
          title: Updated At
        page_type:
          $ref: '#/components/schemas/PageType'
          default: source
      type: object
      required:
      - id
      - slug
      - title
      - summary
      - confidence
      - linter_score
      - content
      - created_at
      - updated_at
      title: ArticleResponse
      description: Full article response with content, backlinks, and source provenance.
    ArticleSourceSummary:
      properties:
        id:
          type: string
          title: Id
        source_type:
          $ref: '#/components/schemas/SourceType'
        title:
          anyOf:
          - type: string
          - type: 'null'
          title: Title
      type: object
      required:
      - id
      - source_type
      - title
      title: ArticleSourceSummary
      description: 'Minimal source descriptor returned with listing/search endpoints.


        A lightweight summary used when the full :class:`SourceResponse` is

        overkill — e.g. article list and search result payloads.'
    ArticleSummaryResponse:
      properties:
        id:
          type: string
          title: Id
        slug:
          type: string
          title: Slug
        title:
          type: string
          title: Title
        summary:
          anyOf:
          - type: string
          - type: 'null'
          title: Summary
        confidence:
          anyOf:
          - $ref: '#/components/schemas/ConfidenceLevel'
          - type: 'null'
        linter_score:
          anyOf:
          - type: number
          - type: 'null'
          title: Linter Score
        sources:
          items:
            $ref: '#/components/schemas/ArticleSourceSummary'
          type: array
          title: Sources
          default: []
        source_count:
          type: integer
          title: Source Count
          default: 0
        backlink_count:
          type: integer
          title: Backlink Count
          default: 0
        created_at:
          type: string
          format: date-time
          title: Created At
        updated_at:
          type: string
          format: date-time
          title: Updated At
        page_type:
          $ref: '#/components/schemas/PageType'
          default: source
      type: object
      required:
      - id
      - slug
      - title
      - summary
      - confidence
      - linter_score
      - created_at
      - updated_at
      title: ArticleSummaryResponse
      description: 'Summary article response for list and search endpoints.


        Includes a lightweight list of sources so that callers can surface

