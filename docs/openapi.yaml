openapi: 3.1.0
info:
  title: WikiMind Gateway
  description: Local LLM Knowledge OS — Personal API
  version: 0.1.0
paths:
  /ingest/url:
    post:
      tags:
      - Ingest
      summary: Ingest Url
      description: Ingest a web URL or YouTube video.
      operationId: ingest_url_ingest_url_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestURLRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Source'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /ingest/pdf:
    post:
      tags:
      - Ingest
      summary: Ingest Pdf
      description: Upload and ingest a PDF.
      operationId: ingest_pdf_ingest_pdf_post
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_ingest_pdf_ingest_pdf_post'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Source'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /ingest/text:
    post:
      tags:
      - Ingest
      summary: Ingest Text
      description: Ingest raw text or a note.
      operationId: ingest_text_ingest_text_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestTextRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Source'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /ingest/sources:
    get:
      tags:
      - Ingest
      summary: List Sources
      description: List all ingested sources.
      operationId: list_sources_ingest_sources_get
      parameters:
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /ingest/sources/{source_id}:
    get:
      tags:
      - Ingest
      summary: Get Source
      description: Get source by ID.
      operationId: get_source_ingest_sources__source_id__get
      parameters:
      - name: source_id
        in: path
        required: true
        schema:
          type: string
          title: Source Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Source'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Ingest
      summary: Delete Source
      description: Delete a source by ID.
      operationId: delete_source_ingest_sources__source_id__delete
      parameters:
      - name: source_id
        in: path
        required: true
        schema:
          type: string
          title: Source Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /wiki/articles:
    get:
      tags:
      - Wiki
      summary: List Articles
      description: List wiki articles with optional filtering and source provenance.
      operationId: list_articles_wiki_articles_get
      parameters:
      - name: concept
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Concept
      - name: confidence
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Confidence
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArticleSummaryResponse'
                title: Response List Articles Wiki Articles Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /wiki/articles/{slug}:
    get:
      tags:
      - Wiki
      summary: Get Article
      description: Get full article with content, backlinks, and source provenance.
      operationId: get_article_wiki_articles__slug__get
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
          title: Slug
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /wiki/graph:
    get:
      tags:
      - Wiki
      summary: Get Graph
      description: Full knowledge graph -- nodes and edges.
      operationId: get_graph_wiki_graph_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphResponse'
  /wiki/search:
    get:
      tags:
      - Wiki
      summary: Search
      description: Full-text search across wiki articles with source provenance.
      operationId: search_wiki_search_get
      parameters:
      - name: q
        in: query
        required: true
        schema:
          type: string
          minLength: 2
          title: Q
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 20
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArticleSummaryResponse'
                title: Response Search Wiki Search Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /wiki/concepts:
    get:
      tags:
      - Wiki
      summary: Get Concepts
      description: Concept taxonomy tree.
      operationId: get_concepts_wiki_concepts_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /wiki/health:
    get:
      tags:
      - Wiki
      summary: Get Health
      description: Latest wiki health report from linter.
      operationId: get_health_wiki_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /query:
    post:
      tags:
      - Query
      summary: Ask
      description: Ask a question against the wiki and receive an answer with citations.
      operationId: ask_query_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /query/history:
    get:
      tags:
      - Query
      summary: Query History
      description: List past queries.
      operationId: query_history_query_history_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 50
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /query/{query_id}/file-back:
    post:
      tags:
      - Query
      summary: File Back
      description: Save a past answer as a wiki article.
      operationId: file_back_query__query_id__file_back_post
      parameters:
      - name: query_id
        in: path
        required: true
        schema:
          type: string
          title: Query Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /jobs:
    get:
      tags:
      - Jobs
      summary: List Jobs
      description: List jobs with optional status filter.
      operationId: list_jobs_jobs_get
      parameters:
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 20
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /jobs/{job_id}:
    get:
      tags:
      - Jobs
      summary: Get Job
      description: Get job by ID.
      operationId: get_job_jobs__job_id__get
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          title: Job Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /jobs/compile/{source_id}:
    post:
      tags:
      - Jobs
      summary: Trigger Compile
      description: Trigger compilation for a source.
      operationId: trigger_compile_jobs_compile__source_id__post
      parameters:
      - name: source_id
        in: path
        required: true
        schema:
          type: string
          title: Source Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /jobs/lint:
    post:
      tags:
      - Jobs
      summary: Trigger Lint
      description: Trigger wiki linting.
      operationId: trigger_lint_jobs_lint_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /jobs/reindex:
    post:
      tags:
      - Jobs
      summary: Trigger Reindex
      description: Trigger wiki reindexing.
      operationId: trigger_reindex_jobs_reindex_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /settings:
    get:
      tags:
      - Settings
      summary: Get All Settings
      description: Return all application settings.
      operationId: get_all_settings_settings_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /settings/llm/api-key:
    post:
      tags:
      - Settings
      summary: Set Provider Api Key
      description: Store API key in OS keychain.
      operationId: set_provider_api_key_settings_llm_api_key_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/APIKeyRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /settings/llm/test:
    post:
      tags:
      - Settings
      summary: Test Llm Connection
      description: Test if a provider is configured and reachable.
      operationId: test_llm_connection_settings_llm_test_post
      parameters:
      - name: provider
        in: query
        required: true
        schema:
          type: string
          title: Provider
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /settings/llm/cost:
    get:
      tags:
      - Settings
      summary: Get Llm Cost
      description: Cost summary for current month.
      operationId: get_llm_cost_settings_llm_cost_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /health:
    get:
      summary: Health
      description: Health check — used by Electron to confirm daemon is ready.
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
components:
  schemas:
    APIKeyRequest:
      properties:
        provider:
          type: string
          title: Provider
        api_key:
          type: string
          title: Api Key
      type: object
      required:
      - provider
      - api_key
      title: APIKeyRequest
      description: Request to set an API key.
    ArticleResponse:
      properties:
        id:
          type: string
          title: Id
        slug:
          type: string
          title: Slug
        title:
          type: string
          title: Title
        summary:
          anyOf:
          - type: string
          - type: 'null'
          title: Summary
        confidence:
          anyOf:
          - $ref: '#/components/schemas/ConfidenceLevel'
          - type: 'null'
        linter_score:
          anyOf:
          - type: number
          - type: 'null'
          title: Linter Score
        concepts:
          items:
            type: string
          type: array
          title: Concepts
          default: []
        backlinks_in:
          items:
            type: string
          type: array
          title: Backlinks In
          default: []
        backlinks_out:
          items:
            type: string
          type: array
          title: Backlinks Out
          default: []
        content:
          type: string
          title: Content
        sources:
          items:
            $ref: '#/components/schemas/SourceResponse'
          type: array
          title: Sources
          default: []
        created_at:
          type: string
          format: date-time
          title: Created At
        updated_at:
          type: string
          format: date-time
          title: Updated At
      type: object
      required:
      - id
      - slug
      - title
      - summary
      - confidence
      - linter_score
      - content
      - created_at
      - updated_at
      title: ArticleResponse
      description: Full article response with content, backlinks, and source provenance.
    ArticleSourceSummary:
      properties:
        id:
          type: string
          title: Id
        source_type:
          $ref: '#/components/schemas/SourceType'
        title:
          anyOf:
          - type: string
          - type: 'null'
          title: Title
      type: object
      required:
      - id
      - source_type
      - title
      title: ArticleSourceSummary
      description: 'Minimal source descriptor returned with listing/search endpoints.


        A lightweight summary used when the full :class:`SourceResponse` is

        overkill — e.g. article list and search result payloads.'
    ArticleSummaryResponse:
      properties:
        id:
          type: string
          title: Id
        slug:
          type: string
          title: Slug
        title:
          type: string
          title: Title
        summary:
          anyOf:
          - type: string
          - type: 'null'
          title: Summary
        confidence:
          anyOf:
          - $ref: '#/components/schemas/ConfidenceLevel'
          - type: 'null'
        linter_score:
          anyOf:
          - type: number
          - type: 'null'
          title: Linter Score
        sources:
          items:
            $ref: '#/components/schemas/ArticleSourceSummary'
          type: array
          title: Sources
          default: []
        created_at:
          type: string
          format: date-time
          title: Created At
        updated_at:
          type: string
          format: date-time
          title: Updated At
      type: object
      required:
      - id
      - slug
      - title
      - summary
      - confidence
      - linter_score
      - created_at
      - updated_at
      title: ArticleSummaryResponse
      description: 'Summary article response for list and search endpoints.


        Includes a lightweight list of sources so that callers can surface

        provenance directly in search/listing views without fetching the full

        article content.'
    Body_ingest_pdf_ingest_pdf_post:
      properties:
        file:
          type: string
          contentMediaType: application/octet-stream
          title: File
      type: object
      required:
      - file
      title: Body_ingest_pdf_ingest_pdf_post
    CitationArticleRef:
      properties:
        slug:
          type: string
          title: Slug
        title:
          type: string
          title: Title
      type: object
      required:
      - slug
      - title
      title: CitationArticleRef
      description: Minimal reference to an article used inside a :class:`CitationResponse`.
    CitationResponse:
      properties:
        article:
          $ref: '#/components/schemas/CitationArticleRef'
        sources:
          items:
            $ref: '#/components/schemas/SourceResponse'
          type: array
          title: Sources
          default: []
      type: object
      required:
      - article
      title: CitationResponse
      description: 'A single Q&A citation: an article plus the sources it was compiled
        from.'
    ConfidenceLevel:
      type: string
      enum:
      - sourced
      - mixed
      - inferred
      - opinion
      title: ConfidenceLevel
      description: Confidence level for claims.
    GraphEdge:
      properties:
        source:
          type: string
          title: Source
        target:
          type: string
          title: Target
        context:
          anyOf:
          - type: string
          - type: 'null'
          title: Context
      type: object
      required:
      - source
      - target
      - context
      title: GraphEdge
      description: An edge in the knowledge graph.
    GraphNode:
      properties:
        id:
          type: string
          title: Id
        label:
          type: string
          title: Label
        concept_cluster:
          anyOf:
          - type: string
          - type: 'null'
          title: Concept Cluster
        connection_count:
          type: integer
          title: Connection Count
        confidence:
          anyOf:
          - $ref: '#/components/schemas/ConfidenceLevel'
          - type: 'null'
      type: object
      required:
      - id
      - label
      - concept_cluster
      - connection_count
      - confidence
      title: GraphNode
      description: A node in the knowledge graph.
    GraphResponse:
      properties:
        nodes:
          items:
            $ref: '#/components/schemas/GraphNode'
          type: array
          title: Nodes
        edges:
          items:
            $ref: '#/components/schemas/GraphEdge'
          type: array
          title: Edges
      type: object
      required:
      - nodes
      - edges
      title: GraphResponse
      description: Full knowledge graph response.
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    IngestStatus:
      type: string
      enum:
      - pending
      - processing
      - compiled
      - failed
      title: IngestStatus
      description: Status of source ingestion.
    IngestTextRequest:
      properties:
        content:
          type: string
          title: Content
        title:
          anyOf:
          - type: string
          - type: 'null'
          title: Title
        auto_compile:
          type: boolean
          title: Auto Compile
          default: true
      type: object
      required:
      - content
      title: IngestTextRequest
      description: Request to ingest raw text.
    IngestURLRequest:
      properties:
        url:
          type: string
          title: Url
        auto_compile:
          type: boolean
          title: Auto Compile
          default: true
      type: object
      required:
      - url
      title: IngestURLRequest
      description: Request to ingest a URL.
    QueryRequest:
      properties:
        question:
          type: string
          title: Question
        file_back:
          type: boolean
          title: File Back
          default: false
      type: object
      required:
      - question
      title: QueryRequest
      description: Request to query the wiki.
    QueryResponse:
      properties:
        id:
          type: string
          title: Id
        question:
          type: string
          title: Question
        answer:
          type: string
          title: Answer
        confidence:
          anyOf:
          - type: string
          - type: 'null'
          title: Confidence
        source_article_ids:
          anyOf:
          - type: string
          - type: 'null'
          title: Source Article Ids
        related_article_ids:
          anyOf:
          - type: string
          - type: 'null'
          title: Related Article Ids
        filed_back:
          type: boolean
          title: Filed Back
        filed_article_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Filed Article Id
        created_at:
          type: string
          format: date-time
          title: Created At
        citations:
          items:
            $ref: '#/components/schemas/CitationResponse'
          type: array
          title: Citations
          default: []
      type: object
      required:
      - id
      - question
      - answer
      - confidence
      - source_article_ids
      - related_article_ids
      - filed_back
      - filed_article_id
      - created_at
      title: QueryResponse
      description: 'Q&A response enriched with a full Answer → Article → Source citation
        chain.


        Mirrors the persisted :class:`Query` record fields while adding a

        resolved ``citations`` list so clients can see which articles were

        used and which original sources those articles came from.'
    Source:
      properties:
        id:
          type: string
          title: Id
        source_type:
          $ref: '#/components/schemas/SourceType'
        source_url:
          anyOf:
          - type: string
          - type: 'null'
          title: Source Url
        title:
          anyOf:
          - type: string
          - type: 'null'
          title: Title
        author:
          anyOf:
          - type: string
          - type: 'null'
          title: Author
        published_date:
          anyOf:
          - type: string
            format: date
          - type: 'null'
          title: Published Date
        status:
          $ref: '#/components/schemas/IngestStatus'
          default: pending
        ingested_at:
          type: string
          format: date-time
          title: Ingested At
        compiled_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Compiled At
        token_count:
          anyOf:
          - type: integer
          - type: 'null'
          title: Token Count
        error_message:
          anyOf:
          - type: string
          - type: 'null'
          title: Error Message
        file_path:
          anyOf:
          - type: string
          - type: 'null'
          title: File Path
        content_hash:
          anyOf:
          - type: string
          - type: 'null'
          title: Content Hash
      type: object
      required:
      - source_type
      title: Source
      description: Raw ingested source — before compilation.
    SourceResponse:
      properties:
        id:
          type: string
          title: Id
        source_type:
          $ref: '#/components/schemas/SourceType'
        title:
          anyOf:
          - type: string
          - type: 'null'
          title: Title
        source_url:
          anyOf:
          - type: string
          - type: 'null'
          title: Source Url
        ingested_at:
          type: string
          format: date-time
          title: Ingested At
      type: object
      required:
      - id
      - source_type
      - title
      - source_url
      - ingested_at
      title: SourceResponse
      description: 'Provenance view of a raw ingested source exposed via the API.


        Trimmed view of :class:`Source` suitable for embedding in article and

        Q&A responses so callers can trace claims back to their origin

