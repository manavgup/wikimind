          <rect x="12" y="12" width="46" height="18" rx="4" fill="#f4f7fb"/>
          <text x="35" y="25" font-size="10" font-weight="500" fill="#2b4876" text-anchor="middle">source</text>
          <rect x="64" y="12" width="50" height="18" rx="4" fill="#ecfdf5"/>
          <text x="89" y="25" font-size="10" font-weight="500" fill="#047857" text-anchor="middle">sourced</text>
          <text x="12" y="50" font-size="13" font-weight="600" fill="#0f172a">The Bitter Lesson</text>
