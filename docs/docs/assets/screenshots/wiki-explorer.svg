          <text x="93" y="25" font-size="10" font-weight="500" fill="#047857" text-anchor="middle">sourced</text>
          <text x="12" y="50" font-size="13" font-weight="600" fill="#0f172a">Transformer Architecture</text>
          <text x="12" y="68" font-size="11" fill="#64748b">Synthesized from 2 source articles</text>
          <text x="12" y="82" font-size="11" fill="#64748b">on self-attention and positional...</text>
          <text x="12" y="120" font-size="10" fill="#94a3b8">2 sources · 6 backlinks</text>
