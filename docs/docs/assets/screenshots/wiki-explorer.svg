          <text x="12" y="68" font-size="11" fill="#64748b">Synthesized from 3 source articles</text>
          <text x="12" y="82" font-size="11" fill="#64748b">covering supervised and unsupervised...</text>
          <text x="12" y="120" font-size="10" fill="#94a3b8">3 sources · 5 backlinks</text>
        </g>

