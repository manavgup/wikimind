          <text x="12" y="68" font-size="11" fill="#64748b">Reviews team velocity, incident</text>
          <text x="12" y="82" font-size="11" fill="#64748b">response, and architectural decisions.</text>
          <text x="12" y="120" font-size="10" fill="#94a3b8">1 source · 1 backlink</text>
