          - ADR-002 ARQ + fakeredis: architecture/adr/adr-002-arq-fakeredis.md
          - ADR-003 Multi-provider LLM router: architecture/adr/adr-003-multi-provider-llm-router.md
          - ADR-004 Markdown files + SQLite: architecture/adr/adr-004-markdown-files-sqlite-metadata.md
          - ADR-005 Confidence-tagged claims: architecture/adr/adr-005-confidence-tagged-claims.md
          - ADR-006 Chunked compilation: architecture/adr/adr-006-chunked-compilation.md
          - ADR-007 Structured JSON prompt: architecture/adr/adr-007-structured-json-prompt-contract.md
          - ADR-008 Pydantic BaseSettings: architecture/adr/adr-008-pydantic-basesettings.md
          - ADR-009 Decoupled ingest/compile: architecture/adr/adr-009-decoupled-ingest-compilation.md
          - ADR-010 Provider auto-enable: architecture/adr/adr-010-llm-provider-auto-enable.md
          - ADR-011 Conversational Q&A: architecture/adr/adr-011-conversational-qa-thread-model.md
          - ADR-012 Knowledge graph: architecture/adr/adr-012-knowledge-graph-architecture.md
          - ADR-013 react-force-graph-2d: architecture/adr/adr-013-react-force-graph-2d.md
          - ADR-014 Hybrid search: architecture/adr/adr-014-hybrid-search-architecture.md
          - ADR-015 CPU-first Docker: architecture/adr/adr-015-cpu-first-docker-packaging.md
          - ADR-016 Article recompilation: architecture/adr/adr-016-article-recompilation.md
          - ADR-017 Backlink enforcer: architecture/adr/adr-017-backlink-enforcer-lint-phase.md
          - ADR-018 Contradiction detection: architecture/adr/adr-018-batched-contradiction-detection.md
          - ADR-019 Runtime preferences: architecture/adr/adr-019-runtime-user-preferences.md
          - ADR-021 PostgreSQL compat: architecture/adr/adr-021-postgres-compatibility.md
          - ADR-022 Multi-user auth: architecture/adr/adr-022-multi-user-authentication.md
          - ADR-023 Container architecture: architecture/adr/adr-023-production-container-architecture.md
          - ADR-024 Gunicorn autoscaling: architecture/adr/adr-024-gunicorn-autoscaling-horizontal-readiness.md
