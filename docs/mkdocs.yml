site_name: WikiMind
site_url: https://manavgup.github.io/wikimind/
site_description: Personal LLM-powered knowledge OS
site_author: Manav Gupta
repo_name: manavgup/wikimind
repo_url: https://github.com/manavgup/wikimind
edit_uri: edit/main/docs/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - awesome-pages
  - glightbox
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - pymdownx.keys
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/manavgup/wikimind

nav:
  - Home: index.md
  - Overview:
      - Features: overview/features.md
      - Quick Start: overview/quick-start.md
      - UI Guide: overview/ui-guide.md
  - Using WikiMind:
      - Ingesting Sources: using/ingestion.md
      - Navigating the Wiki: using/wiki.md
      - Q&A Agent: using/ask.md
      - Concepts & Knowledge Graph: using/concepts.md
  - Deployment:
      - Local Development: deployment/local.md
      - Docker: deployment/docker.md
      - Fly.io: deployment/fly-io.md
  - Architecture:
      - System Overview: architecture/index.md
      - LLM Compilation Pipeline: architecture/compiler.md
      - Ingestion Adapters: architecture/ingest.md
      - Storage Backends: architecture/storage.md
      - ADRs: architecture/adr/index.md
  - API Reference:
      - OpenAPI: api/openapi.md
  - Development:
      - Contributing: development/contributing.md
      - Testing: development/testing.md
      - CI/CD: development/ci-cd.md
  - Configuration:
      - Settings: configuration/settings.md
      - Authentication: configuration/auth.md
      - LLM Providers: configuration/llm-providers.md
