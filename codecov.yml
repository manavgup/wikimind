codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "40...100"
  status:
    project:
      default:
        target: auto
        threshold: 1%
        if_ci_failed: error
        flags:
          - backend
    patch:
      default:
        target: 80%
        threshold: 0%
        if_ci_failed: error
        only_pulls: true
        flags:
          - backend

comment:
  layout: "reach,diff,flags,files"
  require_changes: true
  show_carryforward_flags: false
