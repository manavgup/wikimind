# ===============================================================
# 🚀  Deploy to Fly.io — Staging-Gated Production Pipeline
# ===============================================================
#
#   - chains after the Docker workflow (build → scan → GHCR publish)
#   - deploys staging first, smoke-tests it, then promotes to prod
#   - auto-provisions apps, volumes, Postgres, and secrets
#   - fails loudly on real errors; suppresses only idempotent ones
#
# ---------------------------------------------------------------
# Pipeline
# ---------------------------------------------------------------
#
#   Docker (build + Trivy + GHCR publish)
#     │
#     ▼
#   1️⃣  deploy-staging
#     │  • ensure app + volume exist
#     │  • ensure Postgres cluster + attach
#     │  • stage secrets (--stage, no restart)
#     │  • deploy docling-serve sidecar
#     │  • deploy app from GHCR sha-<commit>
#     │
#     ▼
#   2️⃣  smoke-test-staging
#     │  • 10 functional checks (health, deep health, docs, auth, API data)
#     │  • authenticated tests require STAGING_DEV_TOKEN secret
#     │  ✖ failure → summary alert, prod skipped
#     │
#     ▼
#   3️⃣  deploy-production
#     │  • environment: production (manual approval gate)
#     │  • same provisioning as staging
#     │  • deploy docling-serve sidecar
#     │  • deploy app from same GHCR sha-<commit> tag
#     │
#     ▼
#   4️⃣  verify-production
#     │  • poll /health for 60s
#     │  • functional verification (same checks as staging)
#     │
#     ▼
#   5️⃣  rollback-production (on verify failure)
#        • rolls back to previous Fly.io release
#        • verifies rollback health
#
#   6️⃣  notify-failure (on any job failure)
#        • creates GitHub issue for visibility
#
# ---------------------------------------------------------------
# Auto-provisioning (both environments)
# ---------------------------------------------------------------
#
#   Resource          │ Behavior
#   ──────────────────┼─────────────────────────────────────────
#   Fly app           │ Created if missing
#   Volume            │ Created if missing (1 GB)
#   Postgres cluster  │ Created if missing (⚠️ WARNING emitted)
#   Postgres attach   │ Idempotent; real errors fail the job
#   Secrets           │ Staged (--stage) from GitHub secrets
#   Docling sidecar   │ App created if missing, deployed
#
#   Why ⚠️ on Postgres create: a new cluster has empty data.
#   If the old cluster was deleted, you've lost data. The warning
#   ensures operators notice and investigate.
#
# ---------------------------------------------------------------
# Required GitHub repository secrets
# ---------------------------------------------------------------
#
#   Secret                              │ Purpose
#   ────────────────────────────────────┼────────────────────────
#   FLY_API_TOKEN                       │ Fly.io deploy token
#   ANTHROPIC_API_KEY                   │ LLM provider key
#   WIKIMIND_AUTH__JWT_SECRET_KEY        │ JWT signing key
#   WIKIMIND_AUTH__GOOGLE_CLIENT_ID      │ OAuth client ID
#   WIKIMIND_AUTH__GOOGLE_CLIENT_SECRET  │ OAuth client secret
#   STAGING_DEV_TOKEN                   │ Bearer token for authenticated smoke tests
#   PROD_DEV_TOKEN (optional)           │ Bearer token for prod verification (falls back to STAGING_DEV_TOKEN)
#
# ---------------------------------------------------------------
# Fly.io apps managed by this workflow
# ---------------------------------------------------------------
#
#   App                 │ Config             │ Purpose
#   ────────────────────┼────────────────────┼──────────────────────────
#   wikimind-staging    │ fly.staging.toml   │ Pre-prod gate
#   wikimind            │ fly.toml           │ Production
#   wikimind-docling         │ fly.docling.toml   │ PDF sidecar (production)
#   wikimind-staging-docling │ fly.docling.toml   │ PDF sidecar (staging)
#   wikimind-staging-db │ (Postgres cluster) │ Staging database
#   wikimind-db         │ (Postgres cluster) │ Production database
#   wikimind-staging-redis │ (Upstash Redis)  │ Staging queue
#   wikimind-redis         │ (Upstash Redis)  │ Production queue
#
# ---------------------------------------------------------------

name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Docker"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false  # let in-flight deploys finish

permissions: {}

jobs:
  # -----------------------------------------------------------
  # 1️⃣  Deploy to staging
  # -----------------------------------------------------------
  deploy-staging:
    name: deploy to staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      image_tag: ${{ steps.image.outputs.tag }}
    permissions:
      contents: read
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')

    steps:
      - name: ⬇️  Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 🪁  Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: 📌 Resolve image tag
        id: image
        run: |
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "tag=sha-${SHA::7}" >> "$GITHUB_OUTPUT"

      # 0️⃣  Pre-flight: ensure all secrets are configured
      - name: 🔐  Validate required secrets
        run: |
          missing=0
          # WIKIMIND_REDIS_URL is verified separately in the infrastructure
          # step below (must be set manually via `fly secrets set`).
          for var in ANTHROPIC_API_KEY JWT_SECRET_KEY GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET; do
            if [ -z "${!var}" ]; then
              echo "::error::Required secret ${var} is empty or not configured"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ] || exit 1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JWT_SECRET_KEY: ${{ secrets.WIKIMIND_AUTH__JWT_SECRET_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.WIKIMIND_AUTH__GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.WIKIMIND_AUTH__GOOGLE_CLIENT_SECRET }}

      # 1️⃣  Ensure staging infrastructure exists
      - name: 🏗️  Ensure staging app exists
        run: |
          if ! flyctl status --app wikimind-staging 2>/dev/null; then
            echo "Creating staging app..."
            flyctl apps create wikimind-staging --org personal
            flyctl volumes create wikimind_staging_data --region ord --size 1 --app wikimind-staging --yes
          fi

          # Staging Postgres — separate from production
          if ! flyctl status --app wikimind-staging-db 2>/dev/null; then
            echo "::warning::Creating NEW staging Postgres cluster"
            flyctl postgres create --name wikimind-staging-db --org personal --region ord \
              --vm-size shared-cpu-1x --volume-size 1 --initial-cluster-size 1
          fi

          # Attach — idempotent; only suppress "already attached" errors
          output=$(flyctl postgres attach wikimind-staging-db --app wikimind-staging 2>&1) || {
            if echo "$output" | grep -qi "already attached\|already exists\|already contains"; then
              echo "Postgres already attached to staging"
            else
              echo "::error::Postgres attach failed: $output"
              exit 1
            fi
          }

          # Redis — URL is set manually via `fly secrets set`. Just verify it exists.
          REDIS_CHECK=$(flyctl secrets list --app wikimind-staging 2>/dev/null | grep -c "WIKIMIND_REDIS_URL" || echo "0")
          if [ "$REDIS_CHECK" -gt 0 ]; then
            echo "Redis URL secret exists"
          else
            echo "::error::WIKIMIND_REDIS_URL not set — run: fly secrets set WIKIMIND_REDIS_URL='rediss://...' --app wikimind-staging"
            exit 1
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # 2️⃣  Stage secrets (--stage avoids double-restart before deploy)
      # WIKIMIND_REDIS_URL is managed manually via `fly secrets set` — not staged here.
      - name: 🔑  Stage secrets for staging
        run: |
          flyctl secrets set --stage --app wikimind-staging \
            ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY}" \
            WIKIMIND_AUTH__JWT_SECRET_KEY="${JWT_SECRET_KEY}" \
            WIKIMIND_AUTH__GOOGLE_CLIENT_ID="${GOOGLE_CLIENT_ID}" \
            WIKIMIND_AUTH__GOOGLE_CLIENT_SECRET="${GOOGLE_CLIENT_SECRET}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JWT_SECRET_KEY: ${{ secrets.WIKIMIND_AUTH__JWT_SECRET_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.WIKIMIND_AUTH__GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.WIKIMIND_AUTH__GOOGLE_CLIENT_SECRET }}

      # 3️⃣  Deploy sidecar + app
      - name: 🧠  Deploy staging docling-serve sidecar
        run: |
          flyctl status --app wikimind-staging-docling 2>/dev/null || flyctl apps create wikimind-staging-docling --org personal
          flyctl deploy --config fly.docling.toml --app wikimind-staging-docling --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: 🚀  Deploy to staging
        run: flyctl deploy --config fly.staging.toml --image ghcr.io/${{ github.repository }}:${{ steps.image.outputs.tag }} --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # -----------------------------------------------------------
  # 2️⃣  Smoke-test staging
  # -----------------------------------------------------------
  smoke-test-staging:
    name: smoke-test staging
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: deploy-staging

    steps:
      - name: ⏳  Wait for staging to become healthy
        run: |
          echo "Waiting for staging to become healthy..."
          for i in $(seq 1 30); do
            status=$(curl -sf https://wikimind-staging.fly.dev/health \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" \
              2>/dev/null || echo "")
            if [ "$status" = "ok" ]; then
              echo "Staging healthy after $((i*2))s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Staging health check failed after 60s"
              exit 1
            fi
            sleep 2
          done

      - name: Functional smoke tests
        env:
          TOKEN: ${{ secrets.STAGING_DEV_TOKEN }}
        run: |
          BASE="https://wikimind-staging.fly.dev"

          # 1. Basic health
          curl -sf "$BASE/health" | jq -e '.status == "ok"'
          echo "PASS: health"

          # 2. Deep health — DB, migrations, LLM, stuck sources
          DEEP=$(curl -sf "$BASE/health/deep") || { echo "::error::/health/deep request failed"; exit 1; }
          echo "$DEEP" | jq -e '.status != "unhealthy"' || { echo "::error::/health/deep returned unhealthy"; exit 1; }
          echo "PASS: deep health"

          # 3. Background mode MUST be arq (Redis worker)
          curl -sf "$BASE/health" | jq -e '.background_mode == "arq"' || { echo "::error::background_mode is not arq — Redis/ARQ not configured"; exit 1; }
          echo "PASS: background_mode is arq"

          # 4. Swagger docs load
          curl -sf "$BASE/docs" | grep -q "swagger"
          echo "PASS: docs"

          # 5. Auth endpoint responds
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/auth/me")
          [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ]
          echo "PASS: auth ($STATUS)"

          # 6. Authenticated smoke tests (STAGING_DEV_TOKEN is required)
          if [ -z "$TOKEN" ]; then
            echo "::error::STAGING_DEV_TOKEN secret required for functional smoke tests"
            exit 1
          fi

          curl -sf "$BASE/api/wiki/articles" -H "Authorization: Bearer $TOKEN" | jq -e 'type == "array"'
          echo "PASS: articles endpoint returns array"

          # 7. Sources endpoint
          curl -sf "$BASE/api/ingest/sources" -H "Authorization: Bearer $TOKEN" | jq -e 'type == "array"'
          echo "PASS: sources endpoint returns array"

          # 8. Admin stats (if available)
          ADMIN=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/api/admin/stats" -H "Authorization: Bearer $TOKEN")
          echo "INFO: admin stats responded $ADMIN"

          # 9. Concepts endpoint — MUST return array
          curl -sf "$BASE/api/concepts" -H "Authorization: Bearer $TOKEN" | jq -e 'type == "array"' || { echo "::error::/api/concepts did not return array"; exit 1; }
          echo "PASS: concepts"

          # 10. Compilation schemas — MUST return array
          curl -sf "$BASE/api/compilation-schemas" -H "Authorization: Bearer $TOKEN" | jq -e 'type == "array"' || { echo "::error::/api/compilation-schemas did not return array"; exit 1; }
          echo "PASS: compilation-schemas"

          # 11. End-to-end: ingest text → compile → verify article created
          echo "--- E2E: ingest + compile round-trip ---"
          INGEST=$(curl -sf -X POST "$BASE/api/ingest/text" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"content":"Staging smoke test: the pipeline works.","title":"Smoke Test E2E"}') || { echo "::error::ingest endpoint not available"; exit 1; }
          SOURCE_ID=$(echo "$INGEST" | jq -r '.id // empty')
          if [ -z "$SOURCE_ID" ]; then
            echo "::error::ingest returned no source ID"
            exit 1
          fi
          echo "PASS: ingest created source $SOURCE_ID"

          # Trigger compile
          curl -sf -X POST "$BASE/api/jobs/compile/$SOURCE_ID" \
            -H "Authorization: Bearer $TOKEN" > /dev/null || { echo "::error::compile trigger failed for source $SOURCE_ID"; exit 1; }
          echo "PASS: compile triggered"

          # Poll for completion (max 120s — cold LLM + ARQ can exceed 60s on staging)
          E2E_DONE=false
          for i in $(seq 1 24); do
            sleep 5
            STATUS=$(curl -sf "$BASE/api/ingest/sources/$SOURCE_ID" \
              -H "Authorization: Bearer $TOKEN" | jq -r '.status // empty')
            echo "  poll $i: status=$STATUS"
            if [ "$STATUS" = "compiled" ] || [ "$STATUS" = "done" ]; then
              echo "PASS: E2E compile completed via ARQ/Redis"
              E2E_DONE=true
              break
            fi
            if [ "$STATUS" = "failed" ]; then
              echo "::error::E2E compile failed"
              exit 1
            fi
          done
          if [ "$E2E_DONE" != "true" ]; then
            echo "::error::E2E compile did not reach terminal status in 120s"
            exit 1
          fi

          # Verify side effects: article was created for this source
          ARTICLES=$(curl -sf "$BASE/api/wiki/articles" \
            -H "Authorization: Bearer $TOKEN" | \
            jq -r --arg sid "$SOURCE_ID" '[.[] | select(.source_ids // "" | contains($sid))] | length')
          if [ "$ARTICLES" -gt 0 ] 2>/dev/null; then
            echo "PASS: E2E article created from compiled source ($ARTICLES article(s))"
          else
            echo "::error::compile completed but no article found for source $SOURCE_ID"
            exit 1
          fi

          echo "Staging smoke tests complete"

      - name: 🚨  Create alert on failure
        if: failure()
        run: |
          echo "## Staging smoke tests failed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Production deploy was **skipped** because staging smoke tests did not pass." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Check the failed steps above for details." >> "$GITHUB_STEP_SUMMARY"

  # -----------------------------------------------------------
  # 3️⃣  Deploy to production (only if staging passed)
  # -----------------------------------------------------------
  deploy-production:
    name: deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    permissions:
      contents: read
    needs: [smoke-test-staging, deploy-staging]

    steps:
      - name: ⬇️  Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 🪁  Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: 🏗️  Ensure production app exists
        run: |
          if ! flyctl status --app wikimind 2>/dev/null; then
            echo "Creating production app..."
            flyctl apps create wikimind --org personal
            flyctl volumes create wikimind_data --region ord --size 1 --app wikimind --yes
          fi

          if ! flyctl status --app wikimind-db 2>/dev/null; then
            echo "::warning::Creating NEW Postgres cluster — database will be empty!"
            flyctl postgres create --name wikimind-db --org personal --region ord \
              --vm-size shared-cpu-1x --volume-size 1 --initial-cluster-size 1
          fi

          output=$(flyctl postgres attach wikimind-db --app wikimind 2>&1) || {
            if echo "$output" | grep -qi "already attached\|already exists\|already contains"; then
              echo "Postgres already attached to production"
            else
              echo "::error::Postgres attach failed: $output"
              exit 1
            fi
          }

          # Redis — URL is set manually via `fly secrets set`. Just verify it exists.
          REDIS_CHECK=$(flyctl secrets list --app wikimind 2>/dev/null | grep -c "WIKIMIND_REDIS_URL" || echo "0")
          if [ "$REDIS_CHECK" -gt 0 ]; then
            echo "Redis URL secret exists"
          else
            echo "::error::WIKIMIND_REDIS_URL not set — run: fly secrets set WIKIMIND_REDIS_URL='rediss://...' --app wikimind"
            exit 1
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # WIKIMIND_REDIS_URL is managed manually via `fly secrets set` — not staged here.
      - name: 🔑  Stage secrets for production
        run: |
          flyctl secrets set --stage --app wikimind \
            ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY}" \
            WIKIMIND_AUTH__JWT_SECRET_KEY="${JWT_SECRET_KEY}" \
            WIKIMIND_AUTH__GOOGLE_CLIENT_ID="${GOOGLE_CLIENT_ID}" \
            WIKIMIND_AUTH__GOOGLE_CLIENT_SECRET="${GOOGLE_CLIENT_SECRET}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JWT_SECRET_KEY: ${{ secrets.WIKIMIND_AUTH__JWT_SECRET_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.WIKIMIND_AUTH__GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.WIKIMIND_AUTH__GOOGLE_CLIENT_SECRET }}

      - name: 🧠  Deploy docling-serve sidecar
        run: |
          flyctl status --app wikimind-docling 2>/dev/null || flyctl apps create wikimind-docling --org personal
          flyctl deploy --config fly.docling.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: 🚀  Deploy to production
        run: flyctl deploy --image ghcr.io/${{ github.repository }}:${{ needs.deploy-staging.outputs.image_tag }} --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # -----------------------------------------------------------
  # 4️⃣  Verify production
  # -----------------------------------------------------------
  verify-production:
    name: verify production
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: deploy-production

    steps:
      - name: ✅  Verify deployment health
        run: |
          echo "Waiting for production to become healthy..."
          for i in $(seq 1 30); do
            status=$(curl -sf https://wikimind.fly.dev/health \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" \
              2>/dev/null || echo "")
            if [ "$status" = "ok" ]; then
              echo "Production healthy after $((i*2))s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Production health check failed after 60s"
              exit 1
            fi
            sleep 2
          done

      - name: Functional verification
        env:
          # Prefer dedicated PROD_DEV_TOKEN; fall back to STAGING_DEV_TOKEN
          # until the production token is provisioned.
          TOKEN: ${{ secrets.PROD_DEV_TOKEN || secrets.STAGING_DEV_TOKEN }}
        run: |
          BASE="https://wikimind.fly.dev"

          # 1. Basic health
          curl -sf "$BASE/health" | jq -e '.status == "ok"'
          echo "PASS: health"

          # 2. Deep health
          DEEP=$(curl -sf "$BASE/health/deep") || { echo "::error::/health/deep request failed"; exit 1; }
          echo "$DEEP" | jq -e '.status != "unhealthy"' || { echo "::error::/health/deep returned unhealthy"; exit 1; }
          echo "PASS: deep health"

          # 3. Background mode MUST be arq (Redis worker)
          curl -sf "$BASE/health" | jq -e '.background_mode == "arq"' || { echo "::error::background_mode is not arq — Redis/ARQ not configured"; exit 1; }
          echo "PASS: background_mode is arq"

          # 4. Swagger docs load
          curl -sf "$BASE/docs" | grep -q "swagger"
          echo "PASS: docs"

          # 5. Auth endpoint responds
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/auth/me")
          [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ]
          echo "PASS: auth ($STATUS)"

          # 6. Authenticated checks
          if [ -z "$TOKEN" ]; then
            echo "::error::PROD_DEV_TOKEN or STAGING_DEV_TOKEN secret required for production verification"
            exit 1
          fi

          curl -sf "$BASE/api/wiki/articles" -H "Authorization: Bearer $TOKEN" | jq -e 'type == "array"'
          echo "PASS: articles endpoint returns array"

          curl -sf "$BASE/api/ingest/sources" -H "Authorization: Bearer $TOKEN" | jq -e 'type == "array"'
          echo "PASS: sources endpoint returns array"

          # 7. Concepts endpoint (new tables from #546)
          curl -sf "$BASE/api/concepts" -H "Authorization: Bearer $TOKEN" | jq -e 'type == "array"' || { echo "::error::/api/concepts failed"; exit 1; }
          echo "PASS: concepts"

          # 8. Compilation schemas
          curl -sf "$BASE/api/compilation-schemas" -H "Authorization: Bearer $TOKEN" | jq -e 'type == "array"' || { echo "::error::/api/compilation-schemas failed"; exit 1; }
          echo "PASS: compilation-schemas"

          # 9. Admin stats responds (may be 403 if token user is not admin — that's OK)
          ADMIN=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/api/admin/stats" -H "Authorization: Bearer $TOKEN")
          echo "INFO: admin stats responded $ADMIN"

          echo "Production functional verification complete"

  # -----------------------------------------------------------
  # 5️⃣  Rollback production (if verify fails)
  # -----------------------------------------------------------
  rollback-production:
    name: rollback production
    runs-on: ubuntu-latest
    needs: verify-production
    if: failure()

    steps:
      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Rollback to previous release
        run: |
          PREV=$(flyctl releases -a wikimind --json | jq -r '.[1].ImageRef // empty')
          if [ -n "$PREV" ]; then
            echo "Rolling back to: $PREV"
            flyctl deploy -a wikimind --image "$PREV"
            echo "::warning::Production rolled back to previous release"
          else
            echo "::error::No previous release found for rollback"
            exit 1
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: ✅ Verify rollback health
        run: |
          echo "Verifying rollback health..."
          for i in $(seq 1 15); do
            status=$(curl -sf https://wikimind.fly.dev/health \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" \
              2>/dev/null || echo "")
            if [ "$status" = "ok" ]; then
              echo "Rollback healthy after $((i*2))s"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Rollback health check failed after 30s — manual intervention required"
          exit 1

  # -----------------------------------------------------------
  # 6️⃣  Notify on deploy failure
  # -----------------------------------------------------------
  notify-failure:
    name: notify deploy failure
    runs-on: ubuntu-latest
    needs: [deploy-staging, smoke-test-staging, deploy-production, verify-production]
    if: failure()
    permissions:
      issues: write
    steps:
      - name: 🚨 Create failure issue
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            // Check for existing open deploy-blocked issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'deploy-blocked',
              state: 'open',
              per_page: 1,
            });
            if (issues.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `Deploy failed again for commit ${context.sha.substring(0, 7)}.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 Deploy failed: ${context.sha.substring(0, 7)}`,
                body: `Deploy workflow failed for commit ${context.sha}.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                labels: ['bug', 'deploy-blocked']
              });
            }
