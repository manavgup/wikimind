# ===============================================================
# 🚀  Deploy to Fly.io — Ephemeral-Staging Production Pipeline
# ===============================================================
#
#   - chains after the Docker workflow (build → scan → GHCR publish)
#   - creates a fresh staging stack, smoke-tests it, promotes to
#     prod, then destroys staging — nothing staging-related runs
#     (or bills) between deploys
#   - production infrastructure is validated, never created
#
# ---------------------------------------------------------------
# Pipeline
# ---------------------------------------------------------------
#
#   Docker (build + Trivy + GHCR publish)
#     │
#     ▼
#   1️⃣  deploy-staging
#     │  • clean-slate: destroy any leftover staging app/db
#     │  • create app + volume + Postgres, attach, set secrets
#     │  • deploy app from GHCR sha-<commit>
#     │
#     ▼
#   2️⃣  smoke-test-staging
#     │  • 11 functional checks (health, deep health, docs, auth, API data)
#     │  • authenticated tests require STAGING_DEV_TOKEN secret
#     │  ✖ failure → summary alert, prod skipped
#     │
#     ├──▶ teardown-staging (always, even on smoke failure)
#     │      • destroys wikimind-staging + wikimind-staging-db
#     ▼
#   3️⃣  deploy-production
#     │  • environment: production (manual approval gate)
#     │  • validates prod infra (never creates it)
#     │  • deploy docling-serve sidecar + self-hosted Redis
#     │  • deploy app from same GHCR sha-<commit> tag
#     │
#     ▼
#   4️⃣  verify-production
#     │  • poll /health for 60s
#     │  • functional verification (same checks as staging)
#     │
#     ▼
#   5️⃣  rollback-production (on verify failure)
#        • rolls back to previous Fly.io release
#        • verifies rollback health
#
#   6️⃣  notify-failure (on any job failure)
#        • creates GitHub issue for visibility
#
# ---------------------------------------------------------------
# Infrastructure model
# ---------------------------------------------------------------
#
#   Environment │ Behavior
#   ────────────┼─────────────────────────────────────────────────
#   Staging     │ EPHEMERAL — created from scratch by this workflow
#               │ (app, volume, Postgres) and destroyed after the
#               │ smoke gate. Fresh empty DB every run; migrations
#               │ run via the alembic release_command. Queue uses
#               │ the shared self-hosted Redis on DB index 1;
#               │ docling uses the production sidecar (stateless,
#               │ scale-to-zero).
#   Production  │ PERSISTENT — must exist; deploy fails with setup
#               │ instructions if missing. Never created at deploy
#               │ time to prevent accidental empty databases.
#
# ---------------------------------------------------------------
# Required GitHub repository secrets
# ---------------------------------------------------------------
#
#   Secret                              │ Purpose
#   ────────────────────────────────────┼────────────────────────
#   FLY_API_TOKEN                       │ Fly.io deploy token
#   ANTHROPIC_API_KEY                   │ LLM provider key
#   WIKIMIND_AUTH__JWT_SECRET_KEY        │ JWT signing key
#   WIKIMIND_AUTH__GOOGLE_CLIENT_ID      │ OAuth client ID
#   WIKIMIND_AUTH__GOOGLE_CLIENT_SECRET  │ OAuth client secret
#   STAGING_DEV_TOKEN                   │ Bearer token for authenticated smoke tests
#   PROD_DEV_TOKEN (optional)           │ Bearer token for prod verification (falls back to STAGING_DEV_TOKEN)
#
# ---------------------------------------------------------------
# Fly.io apps managed by this workflow
# ---------------------------------------------------------------
#
#   App                 │ Config             │ Purpose
#   ────────────────────┼────────────────────┼──────────────────────────
#   wikimind-staging    │ fly.staging.toml   │ Pre-prod gate (EPHEMERAL, per-run)
#   wikimind-staging-db │ (Postgres cluster) │ Staging database (EPHEMERAL, per-run)
#   wikimind            │ fly.toml           │ Production
#   wikimind-docling    │ fly.docling.toml   │ PDF sidecar (shared prod + staging)
#   wikimind-db         │ (Postgres cluster) │ Production database
#   wikimind-redis      │ fly.redis.toml     │ Self-hosted Redis (prod = DB 0, staging = DB 1)
#
# ---------------------------------------------------------------

name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Docker"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false  # let in-flight deploys finish

permissions: {}

jobs:
  # -----------------------------------------------------------
  # 1️⃣  Deploy to staging
  # -----------------------------------------------------------
  deploy-staging:
    name: deploy to staging
    runs-on: ubuntu-latest
    timeout-minutes: 15  # includes ~2min for ephemeral Postgres provisioning
    outputs:
      image_tag: ${{ steps.image.outputs.tag }}
    permissions:
      contents: read
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')

    steps:
      - name: ⬇️  Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 🪁  Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: 📌 Resolve image tag
        id: image
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Prefer the triggering Docker workflow's SHA; fall back to
          # the latest successful Docker build (handles workflow_dispatch
          # where the current commit may lack a Docker image).
          SHA="${{ github.event.workflow_run.head_sha }}"
          if [ -z "$SHA" ]; then
            SHA=$(gh run list --workflow=docker.yml --status=completed \
              --json conclusion,headSha \
              --jq '[.[] | select(.conclusion=="success")][0].headSha')
          fi
          if [ -z "$SHA" ]; then
            echo "::error::No successful Docker build found"
            exit 1
          fi
          TAG="sha-${SHA::7}"
          echo "Using image tag: ${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      # 0️⃣  Pre-flight: ensure all secrets are configured
      - name: 🔐  Validate required secrets
        run: |
          missing=0
          # WIKIMIND_REDIS_URL is verified separately in the infrastructure
          # step below (must be set manually via `fly secrets set`).
          for var in ANTHROPIC_API_KEY JWT_SECRET_KEY GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET; do
            if [ -z "${!var}" ]; then
              echo "::error::Required secret ${var} is empty or not configured"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ] || exit 1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JWT_SECRET_KEY: ${{ secrets.WIKIMIND_AUTH__JWT_SECRET_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.WIKIMIND_AUTH__GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.WIKIMIND_AUTH__GOOGLE_CLIENT_SECRET }}

      # 1️⃣  Provision ephemeral staging from a clean slate.
      # Destroy-then-create is deliberate: it is immune to partial state
      # left by a failed teardown (half-attached Postgres, stale DB users,
      # orphaned volumes) that idempotent create-if-absent guards can't
      # recover from. The staging DB is empty every run; the alembic
      # release_command applies the full migration set on deploy.
      - name: 🏗️  Provision ephemeral staging
        run: |
          flyctl apps destroy wikimind-staging --yes 2>/dev/null || true
          flyctl apps destroy wikimind-staging-db --yes 2>/dev/null || true

          flyctl apps create wikimind-staging --org personal
          flyctl volumes create wikimind_staging_data --region ord --size 1 --app wikimind-staging --yes
          flyctl postgres create --name wikimind-staging-db --org personal --region ord \
            --vm-size shared-cpu-1x --volume-size 1 --initial-cluster-size 1 \
            --password "$(openssl rand -hex 16)"
          flyctl postgres attach wikimind-staging-db --app wikimind-staging --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # 2️⃣  Stage secrets (--stage avoids double-restart before deploy).
      # Staging shares the self-hosted production Redis on DB index 1 —
      # ARQ queues are fully separated from production's DB 0, and no
      # per-run Redis app is needed.
      - name: 🔑  Stage secrets for staging
        run: |
          flyctl secrets set --stage --app wikimind-staging \
            ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY}" \
            WIKIMIND_AUTH__JWT_SECRET_KEY="${JWT_SECRET_KEY}" \
            WIKIMIND_AUTH__GOOGLE_CLIENT_ID="${GOOGLE_CLIENT_ID}" \
            WIKIMIND_AUTH__GOOGLE_CLIENT_SECRET="${GOOGLE_CLIENT_SECRET}" \
            WIKIMIND_REDIS_URL="redis://wikimind-redis.internal:6379/1"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JWT_SECRET_KEY: ${{ secrets.WIKIMIND_AUTH__JWT_SECRET_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.WIKIMIND_AUTH__GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.WIKIMIND_AUTH__GOOGLE_CLIENT_SECRET }}

      # 3️⃣  Deploy the app. Staging uses the production docling sidecar
      # (stateless, scale-to-zero) — no per-run sidecar deploy needed.
      - name: 🚀  Deploy to staging
        run: flyctl deploy --config fly.staging.toml --image ghcr.io/${{ github.repository }}:${{ steps.image.outputs.tag }} --remote-only --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: 🔧  Ensure worker machines are running
        run: |
          # Worker machines don't receive HTTP traffic so Fly auto-stops
          # them.  Configure restart=always and start any stopped workers.
          WORKER_IDS=$(flyctl machines list --app wikimind-staging -j \
            | jq -r '.[] | select(.config.metadata.fly_process_group == "worker") | .id')
          for id in $WORKER_IDS; do
            echo "Configuring worker machine $id ..."
            flyctl machine update "$id" --restart always --app wikimind-staging --yes 2>&1 || true
            STATE=$(flyctl machines list --app wikimind-staging -j | jq -r ".[] | select(.id == \"$id\") | .state")
            if [ "$STATE" != "started" ]; then
              echo "Starting worker machine $id (was $STATE) ..."
              flyctl machine start "$id" --app wikimind-staging 2>&1 || true
            fi
          done
          echo "Worker machines configured."
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # -----------------------------------------------------------
  # 2️⃣  Smoke-test staging
  # -----------------------------------------------------------
  smoke-test-staging:
    name: smoke-test staging
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: deploy-staging

    steps:
      - name: ⏳  Wait for staging to become healthy
        run: |
          echo "Waiting for staging to become healthy..."
          for i in $(seq 1 30); do
            status=$(curl -sf https://wikimind-staging.fly.dev/health \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" \
              2>/dev/null || echo "")
            if [ "$status" = "ok" ]; then
              echo "Staging healthy after $((i*2))s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Staging health check failed after 60s"
              exit 1
            fi
            sleep 2
          done

      - name: Functional smoke tests
        env:
          TOKEN: ${{ secrets.STAGING_DEV_TOKEN }}
        run: |
          BASE="https://wikimind-staging.fly.dev"

          # 1. Basic health
          curl -sf "$BASE/health" | jq -e '.status == "ok"'
          echo "PASS: health"

          # 2. Deep health — DB, migrations, LLM, stuck sources
          DEEP=$(curl -sf "$BASE/health/deep") || { echo "::error::/health/deep request failed"; exit 1; }
          echo "$DEEP" | jq -e '.status != "unhealthy"' || { echo "::error::/health/deep returned unhealthy"; exit 1; }
          echo "PASS: deep health"

          # 3. Background mode MUST be arq (Redis worker)
          curl -sf "$BASE/health" | jq -e '.background_mode == "arq"' || { echo "::error::background_mode is not arq — Redis/ARQ not configured"; exit 1; }
          echo "PASS: background_mode is arq"

          # 4. Swagger docs load
          curl -sf "$BASE/docs" | grep -q "swagger"
          echo "PASS: docs"

          # 5. Auth endpoint responds
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/auth/me")
          [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ]
          echo "PASS: auth ($STATUS)"

          # 6. Authenticated smoke tests — exchange dev_token for JWT if needed
          if [ -z "$TOKEN" ]; then
            echo "::error::STAGING_DEV_TOKEN secret required for functional smoke tests"
            exit 1
          fi

          # If the token is a dev_token (not a JWT), exchange it
          if ! echo "$TOKEN" | grep -q '\.'; then
            JWT=$(curl -s -X POST "$BASE/auth/magic-link/verify" \
              -H "Content-Type: application/json" \
              -d "{\"token\":\"$TOKEN\"}" | jq -r '.access_token // empty')
            [ -n "$JWT" ] && TOKEN="$JWT"
          fi

          curl -sf "$BASE/api/wiki/articles" -H "Authorization: Bearer $TOKEN" | jq -e 'type == "array"'
          echo "PASS: articles endpoint returns array"

          # 7. Sources endpoint
          curl -sf "$BASE/api/ingest/sources" -H "Authorization: Bearer $TOKEN" | jq -e 'type == "array"'
          echo "PASS: sources endpoint returns array"

          # 8. Admin stats (if available)
          ADMIN=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/api/admin/stats" -H "Authorization: Bearer $TOKEN")
          echo "INFO: admin stats responded $ADMIN"

          # 9. Concepts endpoint — MUST return array
          curl -sf "$BASE/api/wiki/concepts" -H "Authorization: Bearer $TOKEN" | jq -e 'type == "array"' || { echo "::error::/api/concepts did not return array"; exit 1; }
          echo "PASS: concepts"

          # 10. Compilation schemas — MUST return array
          curl -sf "$BASE/api/compilation-schemas" -H "Authorization: Bearer $TOKEN" | jq -e 'type == "array"' || { echo "::error::/api/compilation-schemas did not return array"; exit 1; }
          echo "PASS: compilation-schemas"

          # 11. Background job E2E — enqueue a ping job, wait for worker to process it.
          # Requires auth (side-effecting endpoint). Retry with backoff to handle
          # worker startup delays after deploy.
          PING_OK=false
          for attempt in 1 2 3 4 5; do
            PING_RESULT=$(curl -sf "$BASE/health/job-ping" \
              -H "Authorization: Bearer $TOKEN") || {
              echo "Attempt $attempt: /health/job-ping request failed, retrying in $((attempt * 5))s..."
              sleep $((attempt * 5))
              continue
            }
            PING_STATUS=$(echo "$PING_RESULT" | jq -r '.status')
            if [ "$PING_STATUS" = "ok" ]; then
              PING_MS=$(echo "$PING_RESULT" | jq -r '.latency_ms')
              echo "PASS: background job E2E (${PING_MS}ms, attempt $attempt)"
              PING_OK=true
              break
            else
              PING_ERR=$(echo "$PING_RESULT" | jq -r '.error // "unknown"')
              echo "Attempt $attempt: job-ping status=$PING_STATUS error=$PING_ERR, retrying in $((attempt * 5))s..."
              sleep $((attempt * 5))
            fi
          done
          if [ "$PING_OK" != "true" ]; then
            echo "::error::Background job E2E failed after 5 attempts"
            echo "$PING_RESULT" | jq . 2>/dev/null || true
            exit 1
          fi

          echo "Staging smoke tests complete (11/11 passed)"

      - name: 🚨  Create alert on failure
        if: failure()
        run: |
          echo "## Staging smoke tests failed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Production deploy was **skipped** because staging smoke tests did not pass." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Check the failed steps above for details." >> "$GITHUB_STEP_SUMMARY"

  # -----------------------------------------------------------
  # 🧹  Teardown ephemeral staging (always — pass or fail)
  # -----------------------------------------------------------
  # Runs regardless of smoke-test outcome so the staging stack never
  # outlives the run. `|| true` guards cover the case where
  # deploy-staging failed before creating anything. Destroying the
  # apps also destroys their machines and volumes.
  teardown-staging:
    name: teardown staging
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [deploy-staging, smoke-test-staging]
    if: always() && needs.deploy-staging.result != 'skipped'

    steps:
      - name: 🪁  Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: 🧹  Destroy staging app + database
        run: |
          flyctl apps destroy wikimind-staging --yes || true
          flyctl apps destroy wikimind-staging-db --yes || true
          echo "Ephemeral staging destroyed."
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # -----------------------------------------------------------
  # 3️⃣  Deploy to production (only if staging passed)
  # -----------------------------------------------------------
  deploy-production:
    name: deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    permissions:
      contents: read
    needs: [smoke-test-staging, deploy-staging]

    steps:
      - name: ⬇️  Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 🪁  Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: 🏗️  Validate production infrastructure
        run: |
          if ! flyctl status --app wikimind 2>/dev/null; then
            echo "::error::Production app 'wikimind' does not exist. Create it manually:"
            echo "::error::  fly apps create wikimind --org personal"
            echo "::error::  fly volumes create wikimind_data --region ord --size 1 --app wikimind --yes"
            exit 1
          fi

          if ! flyctl status --app wikimind-db 2>/dev/null; then
            echo "::error::Production Postgres 'wikimind-db' does not exist. Create it manually:"
            echo "::error::  fly postgres create --name wikimind-db --org personal --region ord --vm-size shared-cpu-1x --volume-size 1 --initial-cluster-size 1"
            echo "::error::  fly postgres attach wikimind-db --app wikimind"
            exit 1
          fi

          # Redis — URL is set manually via `fly secrets set`. Just verify it exists.
          REDIS_CHECK=$(flyctl secrets list --app wikimind 2>/dev/null | grep -c "WIKIMIND_REDIS_URL" || echo "0")
          if [ "$REDIS_CHECK" -gt 0 ]; then
            echo "Redis URL secret exists"
          else
            echo "::error::WIKIMIND_REDIS_URL not set — run: fly secrets set WIKIMIND_REDIS_URL='redis://...' --app wikimind"
            exit 1
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # WIKIMIND_REDIS_URL is managed manually via `fly secrets set` — not staged here.
      - name: 🔑  Stage secrets for production
        run: |
          flyctl secrets set --stage --app wikimind \
            ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY}" \
            WIKIMIND_AUTH__JWT_SECRET_KEY="${JWT_SECRET_KEY}" \
            WIKIMIND_AUTH__GOOGLE_CLIENT_ID="${GOOGLE_CLIENT_ID}" \
            WIKIMIND_AUTH__GOOGLE_CLIENT_SECRET="${GOOGLE_CLIENT_SECRET}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JWT_SECRET_KEY: ${{ secrets.WIKIMIND_AUTH__JWT_SECRET_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.WIKIMIND_AUTH__GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.WIKIMIND_AUTH__GOOGLE_CLIENT_SECRET }}

      - name: 🧱  Deploy self-hosted Redis
        # Idempotent: creates the app + persistent volume on first run, then
        # deploys. Requires FLY_API_TOKEN to have org scope (the same token
        # already deploys the separate wikimind-docling app, so it does).
        run: |
          # 1. Create the app if absent.
          if flyctl apps list --json | python3 -c "import sys,json; sys.exit(0 if 'wikimind-redis' in [a['Name'] for a in json.load(sys.stdin)] else 1)" 2>/dev/null; then
            echo "Redis app 'wikimind-redis' already exists."
          else
            echo "Creating Redis app 'wikimind-redis'."
            flyctl apps create wikimind-redis --org personal
          fi
          # 2. Create the persistent volume if absent. Required before deploy —
          #    flyctl deploy attaches the volume named in [mounts] but never
          #    creates it. Guarded by name so we never make a duplicate.
          if flyctl volumes list --app wikimind-redis --json | python3 -c "import sys,json; sys.exit(0 if 'wikimind_redis_data' in [v['name'] for v in json.load(sys.stdin)] else 1)" 2>/dev/null; then
            echo "Redis volume 'wikimind_redis_data' already exists."
          else
            echo "Creating Redis volume 'wikimind_redis_data'."
            flyctl volumes create wikimind_redis_data --region ord --size 1 --app wikimind-redis --yes
          fi
          # 3. Deploy.
          flyctl deploy --app wikimind-redis --config fly.redis.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: 🧠  Deploy docling-serve sidecar
        run: |
          if ! flyctl status --app wikimind-docling 2>/dev/null; then
            echo "::error::Production docling app 'wikimind-docling' does not exist. Create it manually:"
            echo "::error::  fly apps create wikimind-docling --org personal"
            exit 1
          fi
          flyctl deploy --config fly.docling.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: 🚀  Deploy to production
        run: flyctl deploy --image ghcr.io/${{ github.repository }}:${{ needs.deploy-staging.outputs.image_tag }} --remote-only --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: 🔧  Ensure worker machines are running
        run: |
          WORKER_IDS=$(flyctl machines list --app wikimind -j \
            | jq -r '.[] | select(.config.metadata.fly_process_group == "worker") | .id')
          for id in $WORKER_IDS; do
            echo "Configuring worker machine $id ..."
            flyctl machine update "$id" --restart always --app wikimind --yes 2>&1 || true
            STATE=$(flyctl machines list --app wikimind -j | jq -r ".[] | select(.id == \"$id\") | .state")
            if [ "$STATE" != "started" ]; then
              echo "Starting worker machine $id (was $STATE) ..."
              flyctl machine start "$id" --app wikimind 2>&1 || true
            fi
          done
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # -----------------------------------------------------------
  # 4️⃣  Verify production
  # -----------------------------------------------------------
  verify-production:
    name: verify production
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: deploy-production

    steps:
      - name: ✅  Verify deployment health
        run: |
          echo "Waiting for production to become healthy..."
          for i in $(seq 1 30); do
            status=$(curl -sf https://wikimind.fly.dev/health \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" \
              2>/dev/null || echo "")
            if [ "$status" = "ok" ]; then
              echo "Production healthy after $((i*2))s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Production health check failed after 60s"
              exit 1
            fi
            sleep 2
          done

      - name: Functional verification
        env:
          # Prefer dedicated PROD_DEV_TOKEN; fall back to STAGING_DEV_TOKEN
          # until the production token is provisioned.
          TOKEN: ${{ secrets.PROD_DEV_TOKEN || secrets.STAGING_DEV_TOKEN }}
        run: |
          BASE="https://wikimind.fly.dev"

          # 1. Basic health
          curl -sf "$BASE/health" | jq -e '.status == "ok"'
          echo "PASS: health"

          # 2. Deep health
          DEEP=$(curl -sf "$BASE/health/deep") || { echo "::error::/health/deep request failed"; exit 1; }
          echo "$DEEP" | jq -e '.status != "unhealthy"' || { echo "::error::/health/deep returned unhealthy"; exit 1; }
          echo "PASS: deep health"

          # 3. Background mode MUST be arq (Redis worker)
          curl -sf "$BASE/health" | jq -e '.background_mode == "arq"' || { echo "::error::background_mode is not arq — Redis/ARQ not configured"; exit 1; }
          echo "PASS: background_mode is arq"

          # 4. Swagger docs load
          curl -sf "$BASE/docs" | grep -q "swagger"
          echo "PASS: docs"

          # 5. Auth endpoint responds
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/auth/me")
          [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ]
          echo "PASS: auth ($STATUS)"

          # 6. Authenticated checks — exchange dev_token for JWT
          if [ -z "$TOKEN" ]; then
            echo "::error::PROD_DEV_TOKEN or STAGING_DEV_TOKEN secret required for production verification"
            exit 1
          fi

          JWT=$(curl -s -X POST "$BASE/auth/magic-link/verify" \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"$TOKEN\"}" | jq -r '.access_token // empty')
          if [ -z "$JWT" ]; then
            echo "::warning::Could not exchange token for JWT — skipping authenticated checks"
            echo "Production health verification complete (unauthenticated only)"
            exit 0
          fi
          TOKEN="$JWT"

          curl -sf "$BASE/api/wiki/articles" -H "Authorization: Bearer $TOKEN" | jq -e 'type == "array"'
          echo "PASS: articles endpoint returns array"

          curl -sf "$BASE/api/ingest/sources" -H "Authorization: Bearer $TOKEN" | jq -e 'type == "array"'
          echo "PASS: sources endpoint returns array"

          # 7. Concepts endpoint (new tables from #546)
          curl -sf "$BASE/api/wiki/concepts" -H "Authorization: Bearer $TOKEN" | jq -e 'type == "array"' || { echo "::error::/api/concepts failed"; exit 1; }
          echo "PASS: concepts"

          # 8. Compilation schemas
          curl -sf "$BASE/api/compilation-schemas" -H "Authorization: Bearer $TOKEN" | jq -e 'type == "array"' || { echo "::error::/api/compilation-schemas failed"; exit 1; }
          echo "PASS: compilation-schemas"

          # 9. Admin stats responds (may be 403 if token user is not admin — that's OK)
          ADMIN=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/api/admin/stats" -H "Authorization: Bearer $TOKEN")
          echo "INFO: admin stats responded $ADMIN"

          # 10. Background job E2E — enqueue a ping job, wait for worker to process it.
          # Requires auth (side-effecting endpoint). Retry with backoff to handle
          # worker startup delays after deploy.
          PING_OK=false
          for attempt in 1 2 3 4 5; do
            PING_RESULT=$(curl -sf "$BASE/health/job-ping" \
              -H "Authorization: Bearer $TOKEN") || {
              echo "Attempt $attempt: /health/job-ping request failed, retrying in $((attempt * 5))s..."
              sleep $((attempt * 5))
              continue
            }
            PING_STATUS=$(echo "$PING_RESULT" | jq -r '.status')
            if [ "$PING_STATUS" = "ok" ]; then
              PING_MS=$(echo "$PING_RESULT" | jq -r '.latency_ms')
              echo "PASS: background job E2E (${PING_MS}ms, attempt $attempt)"
              PING_OK=true
              break
            else
              PING_ERR=$(echo "$PING_RESULT" | jq -r '.error // "unknown"')
              echo "Attempt $attempt: job-ping status=$PING_STATUS error=$PING_ERR, retrying in $((attempt * 5))s..."
              sleep $((attempt * 5))
            fi
          done
          if [ "$PING_OK" != "true" ]; then
            echo "::error::Background job E2E failed after 5 attempts"
            echo "$PING_RESULT" | jq . 2>/dev/null || true
            exit 1
          fi

          echo "Production functional verification complete"

  # -----------------------------------------------------------
  # 5️⃣  Rollback production (if verify fails)
  # -----------------------------------------------------------
  # Schema safety: this rollback redeploys the previous image, which
  # runs `alembic upgrade head` from its own migration set. This is
  # safe because our additive-only migration policy (enforced by the
  # migration-safety workflow) guarantees that forward-applied schema
  # changes are backward-compatible — the old code can still work
  # with extra columns/tables it doesn't know about.
  #
  # If a migration were destructive (DROP TABLE/COLUMN), the rolled-
  # back image would crash on missing schema objects. That's why
  # destructive migrations are blocked in CI. See #589.
  # -----------------------------------------------------------
  rollback-production:
    name: rollback production
    runs-on: ubuntu-latest
    needs: verify-production
    if: failure()

    steps:
      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Rollback to previous release
        run: |
          PREV=$(flyctl releases -a wikimind --json | jq -r '.[1].ImageRef // empty')
          if [ -n "$PREV" ]; then
            echo "Rolling back to: $PREV"
            flyctl deploy -a wikimind --image "$PREV"
            echo "::warning::Production rolled back to previous release"
          else
            echo "::error::No previous release found for rollback"
            exit 1
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: ✅ Verify rollback health
        run: |
          echo "Verifying rollback health..."
          for i in $(seq 1 15); do
            status=$(curl -sf https://wikimind.fly.dev/health \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" \
              2>/dev/null || echo "")
            if [ "$status" = "ok" ]; then
              echo "Rollback healthy after $((i*2))s"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Rollback health check failed after 30s — manual intervention required"
          exit 1

  # -----------------------------------------------------------
  # 6️⃣  Notify on deploy failure
  # -----------------------------------------------------------
  notify-failure:
    name: notify deploy failure
    runs-on: ubuntu-latest
    needs: [deploy-staging, smoke-test-staging, deploy-production, verify-production]
    if: failure()
    permissions:
      issues: write
    steps:
      - name: 🚨 Create failure issue
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            // Check for existing open deploy-blocked issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'deploy-blocked',
              state: 'open',
              per_page: 1,
            });
            if (issues.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `Deploy failed again for commit ${context.sha.substring(0, 7)}.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 Deploy failed: ${context.sha.substring(0, 7)}`,
                body: `Deploy workflow failed for commit ${context.sha}.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                labels: ['bug', 'deploy-blocked']
              });
            }
