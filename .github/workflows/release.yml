# ===============================================================
#  Automated Release via release-please
# ===============================================================
#
#   - triggers on push to main
#   - analyzes conventional commits (feat/fix) since last release
#   - opens/updates a "Release PR" with version bump + CHANGELOG
#   - merging the Release PR creates the git tag + GitHub Release
#   - no direct push to main required — works with branch protection
#
#   How it works:
#     1. Push feat:/fix: commits to main (via merged PRs)
#     2. release-please opens a PR titled "chore(main): release X.Y.Z"
#     3. Subsequent pushes update that PR automatically
#     4. When you merge the Release PR, it creates the tag + release
#
#   Version source: pyproject.toml [project] version
# ---------------------------------------------------------------

name: Release

on:
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          release-type: python
          token: ${{ secrets.GITHUB_TOKEN }}
