# ===============================================================
# Migration Replay — Alembic upgrade head on fresh Postgres
# ===============================================================
#
#   - provisions a Postgres 16 service container
#   - runs `alembic upgrade head` from a clean database
#   - verifies all ORM tables exist and are queryable
#   - verifies alembic current matches expected head
#   - catches migration bugs that SQLModel.metadata.create_all()
#     tests miss (the mismatch that caused production crash #546)
#   - triggers on changes to alembic/, models.py, or database.py
# ---------------------------------------------------------------

name: Migration Replay

on:
  push:
    branches: ["main"]
    paths:
      - "alembic/**"
      - "src/wikimind/models.py"
      - "src/wikimind/database.py"
      - ".github/workflows/migration-replay.yml"
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: ["main"]
    paths:
      - "alembic/**"
      - "src/wikimind/models.py"
      - "src/wikimind/database.py"
      - ".github/workflows/migration-replay.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  migration-replay:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: Alembic migration replay
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: wikimind_replay
          POSTGRES_USER: wikimind
          POSTGRES_PASSWORD: wikimind # pragma: allowlist secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wikimind -d wikimind_replay"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      WIKIMIND_DATABASE_URL: postgresql+asyncpg://wikimind:wikimind@127.0.0.1:5432/wikimind_replay # pragma: allowlist secret

    steps:
      # -----------------------------------------------------------
      # 0. Checkout
      # -----------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # -----------------------------------------------------------
      # 1. Set up Python + uv
      # -----------------------------------------------------------
      - name: Setup Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      # -----------------------------------------------------------
      # 2. Install dependencies
      # -----------------------------------------------------------
      - name: Install dependencies
        run: uv sync --frozen

      # -----------------------------------------------------------
      # 3. Run alembic upgrade head from base
      # -----------------------------------------------------------
      - name: Run migration from base to head
        run: |
          uv run alembic upgrade head
          echo "All migrations applied successfully"

      # -----------------------------------------------------------
      # 4. Hard-assert ALL ORM tables exist and are queryable
      # -----------------------------------------------------------
      - name: Verify all ORM tables exist and are queryable
        run: |
          uv run python -c "
          import asyncio
          from sqlalchemy.ext.asyncio import create_async_engine
          from sqlalchemy import text

          REQUIRED_TABLES = sorted([
              'alembic_version',
              'article',
              'articleconcept',
              'articlesource',
              'articletag',
              'backlink',
              'capturesource',
              'claimconcept',
              'compilationdraft',
              'compilationschema',
              'compiledclaim',
              'concept',
              'conceptcluster',
              'conceptkinddef',
              'contradiction',
              'contradictionfinding',
              'conversation',
              'costlog',
              'dismissedfinding',
              'job',
              'lintpaircache',
              'lintreport',
              'migrationhistory',
              'orphanfinding',
              'query',
              'reinforcementevent',
              'rssfeed',
              'savedsearch',
              'sharelink',
              'source',
              'structuralfinding',
              'synclog',
              'tag',
              'user',
              'userapikey',
              'userpreference',
          ])

          async def verify():
              engine = create_async_engine(
                  'postgresql+asyncpg://wikimind:wikimind@127.0.0.1:5432/wikimind_replay'
              )
              async with engine.connect() as conn:
                  result = await conn.execute(text(
                      \"SELECT table_name FROM information_schema.tables \"
                      \"WHERE table_schema = 'public'\"
                  ))
                  actual = sorted(row[0] for row in result.fetchall())
                  print(f'Tables after migration: {actual}')

                  missing = set(REQUIRED_TABLES) - set(actual)
                  unexpected = set(actual) - set(REQUIRED_TABLES)
                  if missing:
                      raise AssertionError(f'Missing tables: {sorted(missing)}')
                  if unexpected:
                      print(f'WARNING: unexpected extra tables: {sorted(unexpected)}')

                  for t in REQUIRED_TABLES:
                      await conn.execute(text(f'SELECT count(*) FROM \"{t}\"'))

                  print(f'All {len(REQUIRED_TABLES)} required tables present and queryable')

              await engine.dispose()

          asyncio.run(verify())
          "

      # -----------------------------------------------------------
      # 5. Verify alembic current matches expected head
      # -----------------------------------------------------------
      - name: Verify alembic current matches expected head
        run: |
          CURRENT=$(uv run alembic current 2>/dev/null | grep -oP '^\w+')
          HEAD=$(uv run alembic heads 2>/dev/null | grep -oP '^\w+')
          echo "Current: $CURRENT"
          echo "Head: $HEAD"
          if [ "$CURRENT" != "$HEAD" ]; then
            echo "FAIL: alembic current ($CURRENT) does not match head ($HEAD)"
            exit 1
          fi
          echo "Migration state is at head"

      # -----------------------------------------------------------
      # 6. Upgrade-path test: N-1 -> seed data -> head (no data loss)
      # -----------------------------------------------------------
      - name: Create second database for upgrade-path test
        run: |
          PGPASSWORD=wikimind psql -h 127.0.0.1 -U wikimind -d wikimind_replay \
            -c "CREATE DATABASE wikimind_upgrade_test;"

      - name: "Upgrade-path: migrate to N-1, seed, upgrade to head, verify"
        env:
          WIKIMIND_DATABASE_URL: postgresql+asyncpg://wikimind:wikimind@127.0.0.1:5432/wikimind_upgrade_test # pragma: allowlist secret
        run: |
          set -euo pipefail

          # Determine head and its parent (N-1)
          HEAD=$(uv run alembic heads 2>/dev/null | grep -oP '^\w+')
          PREV=$(uv run alembic history 2>/dev/null \
            | grep -oP '^\w+' | head -2 | tail -1)
          echo "HEAD=$HEAD  PREV=$PREV"

          if [ "$HEAD" = "$PREV" ] || [ -z "$PREV" ]; then
            echo "Only one migration exists — skipping upgrade-path test"
            exit 0
          fi

          # Step 1: migrate to N-1
          uv run alembic upgrade "$PREV"
          echo "Migrated to $PREV"

          # Step 2: seed a row into the user table
          uv run python -c "
          import asyncio
          from sqlalchemy.ext.asyncio import create_async_engine
          from sqlalchemy import text

          async def seed():
              engine = create_async_engine(
                  'postgresql+asyncpg://wikimind:wikimind@127.0.0.1:5432/wikimind_upgrade_test'
              )
              async with engine.begin() as conn:
                  await conn.execute(text(
                      \"INSERT INTO \\\"user\\\" (id, email, auth_provider, auth_provider_id, is_admin, created_at, updated_at) \"
                      \"VALUES ('seed-user-001', 'seed@test.local', 'google', 'seed-ext-id', false, now(), now())\"
                  ))
              await engine.dispose()
              print('Seed row inserted into user table')

          asyncio.run(seed())
          "

          # Step 3: upgrade to head
          uv run alembic upgrade head
          echo "Upgraded to head"

          # Step 4: verify seed row survives + all tables exist
          uv run python -c "
          import asyncio
          from sqlalchemy.ext.asyncio import create_async_engine
          from sqlalchemy import text

          REQUIRED_TABLES = sorted([
              'alembic_version',
              'article',
              'articleconcept',
              'articlesource',
              'articletag',
              'backlink',
              'capturesource',
              'claimconcept',
              'compilationdraft',
              'compilationschema',
              'compiledclaim',
              'concept',
              'conceptcluster',
              'conceptkinddef',
              'contradiction',
              'contradictionfinding',
              'conversation',
              'costlog',
              'dismissedfinding',
              'job',
              'lintpaircache',
              'lintreport',
              'migrationhistory',
              'orphanfinding',
              'query',
              'reinforcementevent',
              'rssfeed',
              'savedsearch',
              'sharelink',
              'source',
              'structuralfinding',
              'synclog',
              'tag',
              'user',
              'userapikey',
              'userpreference',
          ])

          async def verify():
              engine = create_async_engine(
                  'postgresql+asyncpg://wikimind:wikimind@127.0.0.1:5432/wikimind_upgrade_test'
              )
              async with engine.connect() as conn:
                  # Verify seed row survived
                  result = await conn.execute(text(
                      \"SELECT email FROM \\\"user\\\" WHERE id = 'seed-user-001'\"
                  ))
                  row = result.fetchone()
                  assert row is not None, 'Seed user row lost during upgrade!'
                  assert row[0] == 'seed@test.local', f'Seed email mismatch: {row[0]}'
                  print('Seed row survived upgrade')

                  # Verify all tables exist
                  result = await conn.execute(text(
                      \"SELECT table_name FROM information_schema.tables \"
                      \"WHERE table_schema = 'public'\"
                  ))
                  actual = sorted(row[0] for row in result.fetchall())
                  missing = set(REQUIRED_TABLES) - set(actual)
                  if missing:
                      raise AssertionError(f'Missing tables after upgrade: {sorted(missing)}')
                  print(f'All {len(REQUIRED_TABLES)} required tables present after upgrade-path test')

              await engine.dispose()

          asyncio.run(verify())
          "
          echo "Upgrade-path test passed"
