#
# ===============================================================
# 🧪  PyTest & Coverage — Quality Gate
# ===============================================================
#
#   - runs the backend test suite on the pinned CI Python version
#   - measures branch + line coverage (fails < 80%)
#   - uploads the HTML coverage report as a build artifact
#   - uploads coverage to Codecov on pushes and PRs so patch coverage is reported
#   - executes on every push / PR to `main` when backend test inputs change
#   - runs nightly at 6 AM UTC (schedule) to catch dependency drift
#   - supports manual trigger via workflow_dispatch
# ---------------------------------------------------------------

name: Tests & Coverage

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
      - "codecov.yml"
      - ".github/workflows/test.yml"
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: ["main"]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
      - "codecov.yml"
      - ".github/workflows/test.yml"
  schedule:
    - cron: "0 6 * * *" # 6 AM UTC daily — catches dependency drift
  workflow_dispatch: # allow manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: pytest (py${{ matrix.python }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        # We pin to a single Python version. The matrix is preserved as a
        # 1-element list so we can re-add 3.11/3.13 cheaply if needed.
        python: ["3.12"]

    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      # -----------------------------------------------------------
      # 0️⃣  Checkout
      # -----------------------------------------------------------
      - name: ⬇️  Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # -----------------------------------------------------------
      # 1️⃣  Set up Python + uv
      # -----------------------------------------------------------
      - name: 🐍  Setup Python ${{ matrix.python }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}

      - name: 📦  Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      # -----------------------------------------------------------
      # 2️⃣  Install dependencies (pinned by uv.lock)
      # -----------------------------------------------------------
      - name: 📦  Install dependencies
        run: uv sync --frozen --extra dev

      # -----------------------------------------------------------
      # 3️⃣  Run the tests with coverage (fail under 80%)
      # -----------------------------------------------------------
      - name: 🧪  Run pytest
        run: make coverage-ci

      # -----------------------------------------------------------
      # 4️⃣  Upload coverage artifacts (HTML report)
      # -----------------------------------------------------------
      - name: 📤  Upload HTML coverage
        if: always() && matrix.python == '3.12'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7
          if-no-files-found: ignore

      # -----------------------------------------------------------
      # 5️⃣  Upload coverage to Codecov (push + PR for project/patch status)
      # -----------------------------------------------------------
      - name: 📈  Codecov upload
        if: matrix.python == '3.12'
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          files: coverage.xml
          flags: backend
          name: backend-py312
          fail_ci_if_error: false
          use_oidc: true
