# ===============================================================
# 🧪  PyTest & Coverage — Quality Gate
# ===============================================================
#
#   - runs the backend test suite on Python 3.12
#   - measures branch + line coverage (fails < 80%)
#   - uploads the HTML coverage report as a build artifact
#   - uploads coverage to Codecov on pushes and PRs so patch coverage is reported
#   - executes on every push / PR to *main*
# ---------------------------------------------------------------

name: Tests & Coverage

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
      - "codecov.yml"
      - ".github/workflows/test.yml"
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: ["main"]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
      - "codecov.yml"
      - ".github/workflows/test.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  test:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: pytest (py${{ matrix.python }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        # We pin to a single Python version. The matrix is preserved as a
        # 1-element list so we can re-add 3.11/3.13 cheaply if needed.
        python: ["3.12"]

    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      # -----------------------------------------------------------
      # 0️⃣  Checkout
      # -----------------------------------------------------------
      - name: ⬇️  Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # -----------------------------------------------------------
      # 1️⃣  Set up Python + uv
      # -----------------------------------------------------------
      - name: 🐍  Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: 📦  Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # -----------------------------------------------------------
      # 2️⃣  Install dependencies (pinned by uv.lock)
      # -----------------------------------------------------------
      - name: 📦  Install dependencies
        run: uv sync --frozen --extra dev

      # -----------------------------------------------------------
      # 3️⃣  Run the tests with coverage (fail under 80%)
      # -----------------------------------------------------------
      - name: 🧪  Run pytest
        run: make coverage-ci

      # -----------------------------------------------------------
      # 4️⃣  Upload coverage artifacts (HTML report)
      # -----------------------------------------------------------
      - name: 📤  Upload HTML coverage
        if: always() && matrix.python == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7
          if-no-files-found: ignore

      # -----------------------------------------------------------
      # 5️⃣  Upload coverage to Codecov (push + PR for project/patch status)
      # -----------------------------------------------------------
      - name: 📈  Codecov upload
        if: matrix.python == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: backend
          name: backend-py312
          fail_ci_if_error: false
          use_oidc: true
