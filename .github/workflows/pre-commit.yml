# ===============================================================
# 🪝  Pre-commit Hooks
# ===============================================================
#
#   - validates all pre-commit hooks pass on PRs
#   - checks: trailing whitespace, YAML/TOML/JSON syntax,
#     large files, merge conflicts, private key detection,
#     ruff lint + format
#   - caches pre-commit environments for speed
#   - runs on PRs only — push commits are validated locally
# ---------------------------------------------------------------

name: Pre-commit Checks

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  pre-commit:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: Run pre-commit hooks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      # -----------------------------------------------------------
      # 0️⃣  Checkout
      # -----------------------------------------------------------
      - name: ⬇️  Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # -----------------------------------------------------------
      # 1️⃣  Set up Python + uv
      # -----------------------------------------------------------
      - name: 🐍  Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: 📦  Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      # -----------------------------------------------------------
      # 2️⃣  Install wikimind with lint extras (includes pre-commit)
      # -----------------------------------------------------------
      # The local doc-sync hooks (export_openapi, regenerate_adr_index, etc.)
      # import from `wikimind.*`, so the package must be installed in the
      # same Python environment that pre-commit uses for `language: system`
      # subprocesses. Using `uv run pre-commit` ensures the venv's Python
      # (with wikimind + pyyaml + pathspec) is on PATH for system hooks.
      - name: 📦  Install dependencies
        run: uv sync --frozen --extra lint

      # -----------------------------------------------------------
      # 3️⃣  Cache hook environments
      # -----------------------------------------------------------
      - name: 💾  Cache pre-commit environments
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: pre-commit-

      # -----------------------------------------------------------
      # 4️⃣  Regenerate secrets baseline before validation
      # -----------------------------------------------------------
      # Worktree branches may have stale line numbers in .secrets.baseline.
      # Regenerate it here so the detect-secrets hook validates against
      # the current file contents, not the committed baseline.
      - name: 🔑  Regenerate secrets baseline
        run: uv run detect-secrets scan --baseline .secrets.baseline

      # -----------------------------------------------------------
      # 5️⃣  Run all hooks
      # -----------------------------------------------------------
      - name: 🪝  Run pre-commit on all files
        run: uv run pre-commit run --all-files
