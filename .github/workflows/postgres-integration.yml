name: Postgres integration

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
      - ".github/workflows/postgres-integration.yml"
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: ["main"]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
      - ".github/workflows/postgres-integration.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  postgres-integration:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: postgres-integration
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wikimind
          POSTGRES_PASSWORD: wikimind
          POSTGRES_DB: wikimind
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wikimind -d wikimind"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      WIKIMIND_DATABASE_URL: "postgresql+asyncpg://wikimind:wikimind@localhost:5432/wikimind"
      WIKIMIND_TEST_POSTGRES_URL: "postgresql+asyncpg://wikimind:wikimind@localhost:5432/wikimind"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run Postgres integration tests
        run: make test-postgres-integration
