# ===============================================================
# 🔒  Lockfile Sync Check
# ===============================================================
#
#   - runs `uv lock --check` and fails if uv.lock is out of sync
#     with pyproject.toml
#   - catches PRs that update pyproject.toml without regenerating
#     the lockfile (or vice versa)
# ---------------------------------------------------------------

name: Lockfile Sync Check

on:
  push:
    branches: ["main"]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/lockfile-check.yml"
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: ["main"]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/lockfile-check.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  lockfile-sync:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: uv.lock in sync
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Verify uv.lock is in sync with pyproject.toml
        run: |
          uv lock --check
          echo "uv.lock is in sync with pyproject.toml"
