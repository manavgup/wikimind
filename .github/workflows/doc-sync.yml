# ===============================================================
# 📚  Doc Sync — verify docs stay in step with code
# ===============================================================
#
#   Two jobs:
#     1. auto-gen-check — regenerate OpenAPI / ADR index / README
#        make-targets block and fail if the committed files drift.
#     2. co-change-check — run the co-change rule engine against
#        the PR's diff to catch missing doc updates.
#
#   Both jobs honour the `docs-skip` PR label as an escape hatch.
# ---------------------------------------------------------------

name: Doc Sync

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "docs/**"
      - "Makefile"
      - "README.md"
      - ".github/workflows/doc-sync.yml"
      - ".docs-sync.yaml"
      - "scripts/export_openapi.py"
      - "scripts/regenerate_adr_index.py"
      - "scripts/regenerate_readme_targets.py"
      - "scripts/check_doc_sync.py"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  # -----------------------------------------------------------
  # Job 1 — Auto-gen check: regenerate and diff
  # -----------------------------------------------------------
  auto-gen-check:
    if: >-
      (github.event_name != 'pull_request' || !github.event.pull_request.draft)
      && !contains(github.event.pull_request.labels.*.name, 'docs-skip')
    name: auto-gen check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    env:
      PYTHONUNBUFFERED: "1"
      WIKIMIND_ENV: development

    steps:
      - name: ⬇️  Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 🐍  Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: 📦  Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: 📦  Install dependencies
        run: uv sync --frozen --extra dev

      - name: 📚  Verify auto-generated docs are in sync
        run: |
          uv run python scripts/export_openapi.py
          uv run python scripts/regenerate_adr_index.py
          uv run python scripts/regenerate_readme_targets.py
          if ! git diff --quiet docs/openapi.yaml docs/adr/README.md README.md; then
            echo "DRIFT detected — the following auto-generated files changed:"
            git diff --stat docs/openapi.yaml docs/adr/README.md README.md
            echo ""
            echo "Regenerate with: make regenerate-docs && git add docs/ README.md"
            exit 1
          fi
          echo "OK   All auto-generated docs are in sync."

  # -----------------------------------------------------------
  # Job 2 — Co-change rule engine
  # -----------------------------------------------------------
  co-change-check:
    if: >-
      github.event_name == 'pull_request'
      && !github.event.pull_request.draft
      && !contains(github.event.pull_request.labels.*.name, 'docs-skip')
    name: co-change check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read

    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: ⬇️  Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 🐍  Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: 📦  Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: 📦  Install dependencies
        run: uv sync --frozen --extra lint

      - name: 📚  Run doc-sync rule engine
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
        run: |
          uv run python scripts/check_doc_sync.py --base "$BASE"
