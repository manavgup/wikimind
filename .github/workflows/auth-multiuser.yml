# ===============================================================
# Auth & Multi-user Isolation — Regression Gate
# ===============================================================
#
#   - runs the focused subset of tests that verify auth (JWT,
#     websocket user extraction) and multi-user data isolation
#   - covers both unit-level scoping tests and the integration-level
#     multi-user isolation suite
#   - fast lane (~1 minute) — suitable to be marked required for merge
#   - triggers on PRs and pushes to main when backend code changes
# ---------------------------------------------------------------

name: Auth & Multi-user

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/auth-multiuser.yml"
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: ["main"]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/auth-multiuser.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  auth-multiuser:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: auth & multi-user isolation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      # -----------------------------------------------------------
      # 0. Checkout
      # -----------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # -----------------------------------------------------------
      # 1. Set up Python + uv
      # -----------------------------------------------------------
      - name: Setup Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      # -----------------------------------------------------------
      # 2. Install dependencies
      # -----------------------------------------------------------
      - name: Install dependencies
        run: uv sync --frozen --extra dev

      # -----------------------------------------------------------
      # 3. Run auth + multi-user test subset
      # -----------------------------------------------------------
      - name: Run auth & multi-user tests
        run: make test-auth-multiuser
