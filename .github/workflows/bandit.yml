# ===============================================================
# 🔐  Bandit Security Scan
# ===============================================================
#
#   - mirrors local `make bandit` usage against `src/wikimind`
#   - uses the shared `[tool.bandit]` config from `pyproject.toml`
#   - converts Bandit JSON into SARIF and uploads findings into GitHub code scanning
# ---------------------------------------------------------------

name: Bandit Security Scan

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/bandit.yml"
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: ["main"]
    paths:
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/bandit.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  bandit:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: bandit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: ⬇️  Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 🐍  Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦  Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: 📦  Install dependencies
        run: uv sync --frozen --extra lint

      - name: 🔐  Run Bandit
        run: |
          uv run bandit -r src/wikimind -c pyproject.toml -f json -o bandit.json || true
          uv run python scripts/bandit_json_to_sarif.py bandit.json bandit.sarif
          uv run python - <<'PY'
          import json
          import sys
          from pathlib import Path

          severities = {"LOW": 1, "MEDIUM": 2, "HIGH": 3}
          findings = json.loads(Path("bandit.json").read_text()).get("results", [])
          threshold = severities["MEDIUM"]
          blocking = [
              finding
              for finding in findings
              if severities.get(finding.get("issue_severity", "").upper(), 0) >= threshold
          ]

          if blocking:
              for finding in blocking:
                  print(
                      f"{finding['filename']}:{finding['line_number']} "
                      f"{finding['issue_severity']} {finding['test_id']} {finding['issue_text']}"
                  )
              sys.exit(1)
          PY

      - name: 📤  Upload Bandit SARIF
        if: always() && hashFiles('bandit.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif
