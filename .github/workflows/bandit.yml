# ===============================================================
# 🔐  Bandit Security Scan
# ===============================================================
#
#   - mirrors local `make bandit` usage against `src/wikimind`
#   - uses the shared `[tool.bandit]` config from `pyproject.toml`
#   - converts Bandit JSON into SARIF and uploads findings into GitHub code scanning
# ---------------------------------------------------------------

name: Bandit Security Scan

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/bandit.yml"
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: ["main"]
    paths:
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/bandit.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  bandit:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: bandit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write

    steps:
      - name: ⬇️  Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: 🐍  Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: 📦  Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: 📦  Install dependencies
        run: uv sync --frozen --extra lint

      - name: 🔐  Run Bandit
        run: |
          uv run bandit -r src/wikimind -c pyproject.toml -f json -o bandit.json || true
          uv run python scripts/bandit_json_to_sarif.py bandit.json bandit.sarif
          uv run python - <<'PY'
          import json
          import sys
          from pathlib import Path

          severities = {"LOW": 1, "MEDIUM": 2, "HIGH": 3}
          findings = json.loads(Path("bandit.json").read_text()).get("results", [])
          threshold = severities["MEDIUM"]
          blocking = [
              finding
              for finding in findings
              if severities.get(finding.get("issue_severity", "").upper(), 0) >= threshold
          ]

          if blocking:
              for finding in blocking:
                  print(
                      f"{finding['filename']}:{finding['line_number']} "
                      f"{finding['issue_severity']} {finding['test_id']} {finding['issue_text']}"
                  )
              sys.exit(1)
          PY

      - name: 📤  Upload Bandit SARIF
        if: always() && hashFiles('bandit.sarif') != ''
        uses: github/codeql-action/upload-sarif@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3
        with:
          sarif_file: bandit.sarif
