# ===============================================================
# 🔍  Lint & Static Analysis
# ===============================================================
#
#   - runs ruff (linter + formatter check) and mypy in parallel
#   - ruff catches import ordering, style violations, bugbear
#   - ruff scope matches `make lint` / `make format-check` (`src/` + `tests/`)
#   - mypy enforces strict type checking with pydantic plugin
#   - fast — should complete in under 2 minutes
# ---------------------------------------------------------------

name: Lint & Static Analysis

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
      - ".github/workflows/lint.yml"
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: ["main"]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
      - ".github/workflows/lint.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  # -----------------------------------------------------------
  # Job 1 — Ruff: lint rules + format check
  # -----------------------------------------------------------
  ruff:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: ruff (lint + format)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: ⬇️  Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: 🐍  Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: 📦  Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: 📦  Install dependencies
        run: uv sync --frozen --extra lint

      - name: 🔍  Ruff lint
        run: uv run ruff check src/ tests/

      - name: 🎨  Ruff format check
        run: uv run ruff format --check src/ tests/

  # -----------------------------------------------------------
  # Job 2 — Mypy: strict type checking
  # -----------------------------------------------------------
  mypy:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: mypy (type checking)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: ⬇️  Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: 🐍  Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: 📦  Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: 📦  Install dependencies
        run: uv sync --frozen --extra dev

      - name: 🔍  Mypy strict
        run: uv run mypy src/wikimind
