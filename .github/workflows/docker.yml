# ===============================================================
# 🐳  Docker Build, Scan & Publish
# ===============================================================
#
# Covers four failure modes for the container side of the project:
#
#   Tier 1 — PR build verification
#     Every PR that touches the Docker files rebuilds the `dev`
#     image so broken Dockerfiles / unresolvable deps / base-image
#     surprises fail the PR instead of the next `make docker-up`.
#
#   Tier 2 — Weekly base-image refresh
#     Every Monday at 09:00 UTC, rebuild from scratch with
#     `--no-cache --pull` so we catch bit-rot in python:3.11-slim
#     (CVEs, apt index changes, upstream yanks) before anyone feels
#     it locally.
#
#   Tier 3 — CVE scan (Trivy)
#     Every build runs Trivy on the resulting image and fails the
#     job on CRITICAL or HIGH CVEs that have a fix available.
#     `ignore-unfixed: true` avoids noisy failures on upstream bugs
#     we cannot act on. HIGH findings published within the last
#     7 days are ignored (.github/trivy/ignore-policy.rego) so a
#     same-week advisory can't freeze unrelated in-flight merges;
#     CRITICAL findings always block immediately.
#
#   Tier 4 — Publish to GHCR on merge
#     On push to main, build the `prod` target multi-arch
#     (linux/amd64, linux/arm64) and push to
#     ghcr.io/<owner>/<repo> with :latest and :sha-<short> tags.
#     Uses GITHUB_TOKEN — no extra secrets needed for GHCR.
# ---------------------------------------------------------------

name: Docker

on:
  push:
    branches: ["main"]
    paths:
      - "Dockerfile"
      - "docker/**"
      - "docker-compose.yml"
      - "docker-entrypoint.sh"
      - ".dockerignore"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "alembic/**"
      - "apps/web/**"
      - "fly.toml"
      - "fly.staging.toml"
      - "fly.docling.toml"
      - "fly.redis.toml"
      - "gunicorn.conf.py"
      - ".github/workflows/docker.yml"
      - ".github/workflows/deploy.yml"
      - ".trivyignore"
      - ".github/trivy/**"
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: ["main"]
    paths:
      - "Dockerfile"
      - "docker/**"
      - "docker-compose.yml"
      - "docker-entrypoint.sh"
      - ".dockerignore"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "alembic/**"
      - "apps/web/**"
      - "fly.toml"
      - "fly.staging.toml"
      - "fly.docling.toml"
      - "fly.redis.toml"
      - "gunicorn.conf.py"
      - ".github/workflows/docker.yml"
      - ".github/workflows/deploy.yml"
      - ".trivyignore"
      - ".github/trivy/**"
  schedule:
    # Weekly rebuild against the latest base image — catches bit-rot.
    - cron: "0 9 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------
  # Tier 1 — build dev + prod targets on every PR / push to main
  # Splits the CVE scan into its own job (below) so Trivy shows up
  # as a separate top-level check in the GitHub PR UI instead of
  # being hidden inside a "build + scan" umbrella step.
  # ---------------------------------------------------------------
  build:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: build prod image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: ⬇️  Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: 🔧  Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: "\U0001F4C5  Compute weekly cache key"
        id: cache-key
        run: echo "week=$(date +%G-W%V)" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------
      # Build the prod image — this is what ships. Dev image is only
      # needed locally via docker-compose; CI tests cover the Python
      # layer via pytest/ruff/mypy directly.
      # -----------------------------------------------------------
      - name: 🏗️   Build prod image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          target: prod
          push: false
          load: true
          tags: wikimind-prod:ci
          cache-from: type=gha,scope=prod-${{ steps.cache-key.outputs.week }}
          cache-to: type=gha,scope=prod-${{ steps.cache-key.outputs.week }},mode=max

      - name: 🔍  Image size check
        run: |
          SIZE=$(docker image inspect wikimind-prod:ci --format '{{.Size}}')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Image size: ${SIZE_MB}MB"
          if [ "$SIZE_MB" -gt 1400 ]; then
            echo "::error::Image exceeds 1400MB (got ${SIZE_MB}MB)"
            exit 1
          fi

  # ---------------------------------------------------------------
  # Tier 3 — Trivy CVE scan on the prod image
  # Reuses the prod cache from the build job for a near-instant load.
  # ---------------------------------------------------------------
  scan:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: CVE scan (Trivy)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: ⬇️  Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: 🔧  Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: "\U0001F4C5  Compute weekly cache key"
        id: cache-key
        run: echo "week=$(date +%G-W%V)" >> "$GITHUB_OUTPUT"

      - name: 🏗️   Load prod image from cache
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          target: prod
          push: false
          load: true
          tags: wikimind-prod:ci
          cache-from: type=gha,scope=prod-${{ steps.cache-key.outputs.week }}

      - name: 🔒  Scan for CVEs (Trivy)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: wikimind-prod:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: .trivyignore
          ignore-policy: .github/trivy/ignore-policy.rego

  # ---------------------------------------------------------------
  # Tier 2 — weekly rebuild from scratch against the latest base
  # Runs only on the Monday cron; detects bit-rot that layer cache
  # hides from the day-to-day build.
  # Complementary to the weekly cache-scope rotation above — the
  # rotation ensures mid-week builds get fresh apt layers, while
  # this job validates a fully clean build with --no-cache --pull.
  # ---------------------------------------------------------------
  weekly-refresh:
    if: github.event_name == 'schedule'
    name: weekly rebuild (no cache)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: ⬇️  Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: 🔧  Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: 🏗️   Rebuild prod image against latest base
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          target: prod
          push: false
          load: true
          tags: wikimind-prod:weekly
          no-cache: true
          pull: true

      - name: 🔒  Scan weekly image for CVEs
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: wikimind-prod:weekly
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: .trivyignore
          ignore-policy: .github/trivy/ignore-policy.rego

  # ---------------------------------------------------------------
  # Tier 4 — publish the prod image to GHCR on merge to main
  # Multi-arch (linux/amd64, linux/arm64) so deploy targets match
  # both cloud x86 hosts and Apple Silicon dev machines.
  # ---------------------------------------------------------------
  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: publish prod image to GHCR
    needs: [build, scan]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: ⬇️  Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # QEMU is required for cross-compiling linux/arm64 from the
      # ubuntu-latest runner (which is linux/amd64).
      - name: 🪄  Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: 🔧  Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: "\U0001F4C5  Compute weekly cache key"
        id: cache-key
        run: echo "week=$(date +%G-W%V)" >> "$GITHUB_OUTPUT"

      - name: 🔑  Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️   Extract image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🚀  Build & push prod image (multi-arch)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          target: prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=prod-${{ steps.cache-key.outputs.week }}
          cache-to: type=gha,scope=prod-${{ steps.cache-key.outputs.week }},mode=max

  # ---------------------------------------------------------------
  # Alert — auto-create an issue when the deploy pipeline breaks
  # Only fires on main pushes so PR failures don't create noise.
  # ---------------------------------------------------------------
  notify-failure:
    if: >-
      failure() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    name: alert on deploy-pipeline failure
    needs: [build, scan, publish]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write

    steps:
      - name: 🚨  Create issue for pipeline failure
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const title = '🚨 Deploy pipeline blocked — Docker workflow failed on main';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'deploy-blocked',
              per_page: 5,
            });
            if (existing.data.some(i => i.title === title)) {
              console.log('Issue already exists — skipping duplicate.');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                '## Deploy pipeline is blocked',
                '',
                `The Docker workflow failed on \`main\` and GHCR publish was skipped.`,
                `Deploys to Fly.io will not proceed until this is fixed.`,
                '',
                `**Failed run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                `**Commit:** ${context.sha.slice(0, 7)}`,
                '',
                '### Common causes',
                '- Trivy CVE scan found a HIGH/CRITICAL vulnerability with a fix available',
                '- Docker build failed (dependency resolution, base image issue)',
                '',
                '### To fix',
                '1. Click the failed run link above',
                '2. Check which job failed (usually CVE scan)',
                '3. Fix the issue (e.g. bump the vulnerable dependency)',
                '4. Push to main — the pipeline will retry automatically',
              ].join('\n'),
              labels: ['bug', 'infra', 'deploy-blocked'],
            });
