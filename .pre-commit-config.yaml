# ──────────────────────────────────────────────────────────────────────────────
# WikiMind — Pre-commit Hooks
# Install: pre-commit install
# Run all: pre-commit run --all-files
# ──────────────────────────────────────────────────────────────────────────────

fail_fast: true

repos:
  # ── General file hygiene ──────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: "^docs/"
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
        exclude: "^apps/"
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: detect-private-key

  # ── Ruff (lint + format) ──────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        args: ["--config=pyproject.toml", "--fix"]
      - id: ruff-format
        args: ["--config=pyproject.toml"]

  # ── Secret detection ─────────────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  # ── Doc sync (local hooks) ────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: regenerate-adr-index
        name: ADR index — regenerate docs/adr/README.md
        entry: python scripts/regenerate_adr_index.py
        language: system
        pass_filenames: false
        always_run: true
        files: ^docs/adr/

      - id: regenerate-readme-targets
        name: README make-targets section — regenerate
        entry: python scripts/regenerate_readme_targets.py
        language: system
        pass_filenames: false
        always_run: true
        files: ^(Makefile|README\.md)$

      - id: check-openapi
        name: OpenAPI schema — verify docs/openapi.yaml matches FastAPI app
        entry: python scripts/export_openapi.py --check
        language: system
        pass_filenames: false
        always_run: true
        files: ^(src/wikimind/api/|docs/openapi\.yaml)

      - id: check-doc-sync
        name: Doc sync — verify docs are updated alongside code
        entry: python scripts/check_doc_sync.py
        language: system
        pass_filenames: false
        always_run: true

      - id: check-docker-bloat
        name: Docker bloat guard — no GPU deps in core
        entry: python scripts/check_docker_bloat.py
        language: system
        pass_filenames: false
        files: ^pyproject\.toml$

      - id: forbid-ai-artifacts
        name: Forbid AI-generated artifacts
        entry: >-
          bash -c 'grep -rn --include="*.py" --include="*.ts" --include="*.tsx"
          --include="*.md" -E "\[oaicite:|contentReference\[|As an AI language model|As a large language model"
          "$@" && echo "ERROR: AI artifacts found" && exit 1 || exit 0' --
        language: system
        types: [text]
