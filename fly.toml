# fly.toml — Fly.io deployment for WikiMind.
#
# First-time setup (creates app, volume, Postgres, secrets):
#   ./scripts/fly-setup.sh
#
# Deploy:
#   fly deploy
#
# CI auto-deploys on merge to main (see .github/workflows/deploy.yml).

app = "wikimind"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    TORCH_INDEX = "https://download.pytorch.org/whl/cpu"

[env]
  WIKIMIND_SERVER__HOST = "0.0.0.0"
  WIKIMIND_SERVER__PORT = "7842"
  # Gunicorn workers (see gunicorn.conf.py).
  # Each worker loads Docling/PyTorch models (~250-400 MB RSS).
  # 2 workers fits safely in 2 GB; async handles concurrency within each.
  WEB_CONCURRENCY = "2"

[http_service]
  internal_port = 7842
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  # Fly spins up additional machines when connections exceed soft_limit.
  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

  # Machine-level checks during deploy. The app takes ~45s to start
  # (Alembic migrations + Docling model warmup), so give it 60s.
  [[http_service.machine_checks]]
    grace_period = "60s"
    port = 7842

[deploy]
  strategy = "rolling"

[mounts]
  source = "wikimind_data"
  destination = "/home/wikimind/.wikimind"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    type = "http"
    port = 7842
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "60s"
