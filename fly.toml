# fly.toml — Fly.io deployment for WikiMind.
#
# First-time setup (creates app, volume, Postgres, secrets):
#   ./scripts/fly-setup.sh
#
# Deploy:
#   fly deploy
#
# CI auto-deploys on merge to main (see .github/workflows/deploy.yml).

app = "wikimind"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  WIKIMIND_SERVER__HOST = "0.0.0.0"
  WIKIMIND_SERVER__PORT = "7842"
  WIKIMIND_DOCLING_SERVE_URL = "http://wikimind-docling.internal:5001"
  # Gunicorn workers — keep low on 1-CPU/1GB Fly.io machines to avoid
  # memory pressure and startup timeout cascades.
  WEB_CONCURRENCY = "2"

[http_service]
  internal_port = 7842
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 25


[deploy]
  strategy = "rolling"

[mounts]
  source = "wikimind_data"
  destination = "/home/wikimind/.wikimind"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    type = "http"
    port = 7842
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "60s"
