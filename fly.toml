# fly.toml — Fly.io deployment for WikiMind.
#
# Prerequisites:
#   fly auth login
#   fly apps create wikimind
#   fly postgres create --name wikimind-db
#   fly postgres attach wikimind-db
#
# Deploy:
#   fly deploy
#
# Set LLM API key:
#   fly secrets set ANTHROPIC_API_KEY=<your-key>

app = "wikimind"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    TORCH_INDEX = "https://download.pytorch.org/whl/cpu"

[env]
  WIKIMIND_SERVER__HOST = "0.0.0.0"
  WIKIMIND_SERVER__PORT = "7842"
  # Auto-tune gunicorn workers to CPU (see gunicorn.conf.py).
  # Shared 1-CPU machine → 3 workers by default; set explicitly to override.
  WEB_CONCURRENCY = "3"

[http_service]
  internal_port = 7842
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  # Fly spins up additional machines when connections exceed soft_limit.
  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    type = "http"
    port = 7842
    path = "/health"
    interval = "30s"
    timeout = "5s"
