# fly.toml — Fly.io deployment for WikiMind.
#
# Single machine runs web + ARQ worker + Redis via docker/start-combined.sh.
# Scale-to-zero applies to everything: Fly stops the machine when idle and
# restarts it on the first incoming request. All three processes start and
# stop together as one unit.
#
# First-time setup (creates app, volume, Postgres, secrets):
#   ./scripts/fly-setup.sh
#
# Deploy:
#   fly deploy
#
# CI auto-deploys on merge to main (see .github/workflows/deploy.yml).

app = "wikimind"
primary_region = "ord"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  WIKIMIND_SERVER__HOST = "0.0.0.0"
  WIKIMIND_SERVER__PORT = "7842"
  WIKIMIND_DOCLING_SERVE_URL = "http://wikimind-docling.internal:5001"
  WIKIMIND_AUTH__PUBLIC_URL = "https://wikimind.fly.dev"
  WIKIMIND_ENV = "production"
  WIKIMIND_REDIS_URL = "redis://localhost:6379/0"

[http_service]
  internal_port = 7842
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Scale to zero when idle — personal deployment, cold starts are acceptable.
  # The proxy starts a machine on the first incoming request.
  min_machines_running = 0
  processes = ["web"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 25


[processes]
  web = "./docker/start-combined.sh"

[deploy]
  strategy = "rolling"
  release_command = ".venv/bin/python -m alembic upgrade head"

[mounts]
  source = "wikimind_data"
  destination = "/home/wikimind/.wikimind"

[[vm]]
  # Three processes share this machine (web + arq worker + redis).
  # Cost only accrues while awake — scale-to-zero keeps idle cost at zero.
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1

[metrics]
  port = 7842
  path = "/metrics"

[checks]
  [checks.health]
    type = "http"
    port = 7842
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "60s"
